---
# k8s/orange-kuma/customer-template.yml
# Template for deploying a new Orange Kuma instance per customer
# Variables to replace: CUSTOMER_NAME, CUSTOMER_DOMAIN
#
# This is used by the Semaphore/Ansible provisioning flow:
#   1. Verkoper clicks "New Customer" in Semaphore
#   2. Ansible copies this template, fills in variables
#   3. kubectl apply deploys the customer namespace + resources
#   4. Argo CD picks it up for ongoing GitOps management

apiVersion: v1
kind: Namespace
metadata:
  name: customer-{{ CUSTOMER_NAME }}
  labels:
    app: orange-kuma
    customer: "{{ CUSTOMER_NAME }}"
    tier: customer-facing

---
# =========================================
# NETWORK POLICIES - Namespace Isolation
# =========================================

# Default deny all ingress — nothing can reach pods in this
# namespace unless explicitly allowed below
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: customer-{{ CUSTOMER_NAME }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Default deny all egress except DNS — pods can't talk to
# other namespaces, only resolve names and reach the internet
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: customer-{{ CUSTOMER_NAME }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Allow Orange Kuma to receive traffic from outside the cluster
# (NodePort / ingress) and talk to the internet (for uptime checks)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-orange-kuma
  namespace: customer-{{ CUSTOMER_NAME }}
spec:
  podSelector:
    matchLabels:
      app: orange-kuma
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from anywhere (NodePort access)
    - {}
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTP/HTTPS outbound (uptime monitoring needs this)
    - to: []
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    # Allow arbitrary TCP for custom port monitoring
    - to:
        # Only to IPs outside the cluster (not other namespaces)
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.42.0.0/16  # k3s pod CIDR
              - 10.43.0.0/16  # k3s service CIDR

---
# Allow Prometheus to scrape metrics from this namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: customer-{{ CUSTOMER_NAME }}
spec:
  podSelector:
    matchLabels:
      app: orange-kuma
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3001

---
# =========================================
# ORANGE KUMA DEPLOYMENT
# =========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orange-kuma
  namespace: customer-{{ CUSTOMER_NAME }}
  labels:
    app: orange-kuma
    customer: "{{ CUSTOMER_NAME }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orange-kuma
      customer: "{{ CUSTOMER_NAME }}"
  template:
    metadata:
      labels:
        app: orange-kuma
        customer: "{{ CUSTOMER_NAME }}"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
    spec:
      containers:
        - name: orange-kuma
          # This will be replaced with the custom Orange Kuma image
          # built by the Drone CI pipeline (rebranded Uptime Kuma)
          image: louislam/uptime-kuma:1
          ports:
            - containerPort: 3001
              name: http
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: orange-kuma-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: orange-kuma-data
  namespace: customer-{{ CUSTOMER_NAME }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: orange-kuma
  namespace: customer-{{ CUSTOMER_NAME }}
  labels:
    app: orange-kuma
    customer: "{{ CUSTOMER_NAME }}"
spec:
  type: NodePort
  selector:
    app: orange-kuma
    customer: "{{ CUSTOMER_NAME }}"
  ports:
    - port: 3001
      targetPort: 3001
      # NodePort will be auto-assigned (30000-32767 range)
      # or set explicitly per customer

---
# =========================================
# SERVICE MONITOR (Prometheus auto-discovery)
# =========================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: orange-kuma
  namespace: customer-{{ CUSTOMER_NAME }}
  labels:
    app: orange-kuma
    release: prometheus
spec:
  selector:
    matchLabels:
      app: orange-kuma
  endpoints:
    - port: http
      interval: 30s
      path: /metrics
