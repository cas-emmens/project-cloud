---
# k8s/management-tool/deployment.yml
# Deployment van de Orange Kuma Management Tool.
#
# Doel: een READ-ONLY klant-gezondheidsdashboard. Provisioning gebeurt
# via Semaphore -> Argo CD (GitOps); deze tool muteert niets. Het leest
# de cluster-status (k8s API), de sync/health (Argo CD API) en de laatste
# commit per klant (Gitea API), en linkt door naar Semaphore om nieuwe
# klanten aan te maken.
#
# Image gebouwd door Drone CI vanuit:
#   orange/orange-uptime-kuma-management-tool
#
# App luistert op poort 4000 (zie server.js: PORT env var, default 4000).
# NodePort: 30087 — bereikbaar via http://10.24.36.10:30087

apiVersion: v1
kind: Namespace
metadata:
  name: orange-kuma
  labels:
    app: orange-kuma

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: management-tool
  namespace: orange-kuma

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: management-tool
# Read-only. Het dashboard rendert alleen status; het schrijft nooit naar
# de cluster. Alle create/patch/update/delete-rechten zijn verwijderd.
rules:
  # Klant-namespaces en hun pods/services uitlezen voor het overzicht.
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services"]
    verbs: ["get", "list", "watch"]
  # Replica-counts van de kuma-deployment per klant uitlezen.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: management-tool
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: management-tool
subjects:
  - kind: ServiceAccount
    name: management-tool
    namespace: orange-kuma

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: management-tool-config
  namespace: orange-kuma
data:
  # Gitea: gebruikt om de laatste commit per klant-manifest te tonen.
  GITEA_URL: "http://10.24.36.10:30080"
  GITEA_ORG: "orange"
  DRONE_URL: "http://10.24.36.10:30081"
  # Semaphore: de "Nieuwe klant aanmaken"-knop linkt hierheen. Vervang
  # dit door een deep-link naar de sales-template zodra de project- en
  # template-id's bekend zijn, bv:
  #   http://10.24.36.10:30084/project/<id>/template/<id>
  SEMAPHORE_URL: "http://10.24.36.10:30084"
  SEMAPHORE_NEW_CUSTOMER_URL: "http://10.24.36.10:30084"
  # Argo CD: UI-link plus de in-cluster API voor sync/health-status.
  ARGOCD_URL: "http://10.24.36.10:30082"
  ARGOCD_API_URL: "http://argocd-server.argocd.svc"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-tool
  namespace: orange-kuma
  labels:
    app: management-tool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-tool
  template:
    metadata:
      labels:
        app: management-tool
    spec:
      serviceAccountName: management-tool
      containers:
        - name: management-tool
          # Image gebouwd door Drone CI en gepushed naar de Gitea container registry.
          # Registry: http://10.24.36.10:30080 (geconfigureerd als insecure mirror in k3s).
          image: 10.24.36.10:30080/orange/orange-uptime-kuma-management-tool:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: management-tool-config
          env:
            # Read-only Argo CD API token (applications get/list). Minted
            # by setup-cicd-pipeline.yml into the management-tool-argocd
            # Secret. Optional: without it the dashboard still renders and
            # simply shows "n.v.t." in the Argo CD column.
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: management-tool-argocd
                  key: token
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: management-tool
  namespace: orange-kuma
  labels:
    app: management-tool
spec:
  type: NodePort
  selector:
    app: management-tool
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30087
      name: http
