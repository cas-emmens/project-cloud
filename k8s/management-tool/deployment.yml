---
# k8s/management-tool/deployment.yml
# Deployment van de Orange Kuma Management Tool voor het marketing-team.
#
# Doel: verkopers kunnen via deze webomgeving Orange Kuma instanties uitrollen voor klanten.
# De app praat direct met de Kubernetes API via de bijgeleverde ClusterRole.
#
# Image gebouwd door Drone CI vanuit:
#   orange/orange-uptime-kuma-management-tool
#
# App luistert op poort 4000 (zie server.js: PORT env var, default 4000).
# NodePort: 30087 — bereikbaar via http://10.24.36.10:30087

apiVersion: v1
kind: Namespace
metadata:
  name: orange-kuma
  labels:
    app: orange-kuma

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: management-tool
  namespace: orange-kuma

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: management-tool
rules:
  # Namespace-beheer voor klant-deployments (delete nodig voor deprovisioning via DELETE /api/customers/:id)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]
  # Deployments voor klant-instanties aanmaken/bijwerken/verwijderen
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "patch", "update", "delete"]
  # Services en PVCs voor klant-instanties
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "patch", "update", "delete"]
  # NetworkPolicies voor namespace-isolatie
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "patch", "update", "delete"]
  # Pod-status opvragen voor health monitoring
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: management-tool
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: management-tool
subjects:
  - kind: ServiceAccount
    name: management-tool
    namespace: orange-kuma

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: management-tool-config
  namespace: orange-kuma
data:
  GITEA_URL: "http://10.24.36.10:30080"
  DRONE_URL: "http://10.24.36.10:30081"
  SEMAPHORE_URL: "http://10.24.36.10:30084"
  ARGOCD_URL: "http://10.24.36.10:30082"
  # Image dat de management tool uitrolt voor klant-Orange Kuma instanties
  KUMA_IMAGE: "10.24.36.10:30080/orange/orange-uptime-kuma:latest"
  K8S_NAMESPACE: "default"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-tool
  namespace: orange-kuma
  labels:
    app: management-tool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-tool
  template:
    metadata:
      labels:
        app: management-tool
    spec:
      serviceAccountName: management-tool
      containers:
        - name: management-tool
          # Image gebouwd door Drone CI en gepushed naar de Gitea container registry.
          # Registry: http://10.24.36.10:30080 (geconfigureerd als insecure mirror in k3s).
          image: 10.24.36.10:30080/orange/orange-uptime-kuma-management-tool:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: management-tool-config
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: management-tool
  namespace: orange-kuma
  labels:
    app: management-tool
spec:
  type: NodePort
  selector:
    app: management-tool
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30087
      name: http
