---
# k8s/management-tool/deployment.yml
# Deployment van de Orange Kuma Management Tool voor het marketing-team.
#
# Doel: marketing kan via deze webomgeving containers uitrollen voor klanten.
# Het is een web-UI die de customer-provisioning workflow aanstuurt.
#
# Image gebouwd door Drone CI vanuit:
#   orange/orange-uptime-kuma-management-tool
#
# Aanname: de app luistert op poort 3000.
# Aanpassen als de .drone.yml een andere poort definieert.
#
# NodePort: 30087 — bereikbaar via http://10.24.36.10:30087

apiVersion: v1
kind: Namespace
metadata:
  name: orange-kuma
  labels:
    app: orange-kuma

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: management-tool
  namespace: orange-kuma

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: management-tool
rules:
  # Namespace-beheer voor klant-deployments
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
  # Deployments voor klant-instanties aanmaken/bijwerken
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "patch", "update"]
  # Services en PVCs voor klant-instanties
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "patch", "update"]
  # NetworkPolicies voor namespace-isolatie (customer-template.yml patroon)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "patch", "update"]
  # Pod-status opvragen voor health monitoring
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: management-tool
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: management-tool
subjects:
  - kind: ServiceAccount
    name: management-tool
    namespace: orange-kuma

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-tool
  namespace: orange-kuma
  labels:
    app: management-tool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-tool
  template:
    metadata:
      labels:
        app: management-tool
    spec:
      serviceAccountName: management-tool
      containers:
        - name: management-tool
          # Image gebouwd door Drone CI en gepushed naar de Gitea container registry.
          # Registry: http://10.24.36.10:30080 (geconfigureerd als insecure mirror in k3s).
          image: 10.24.36.10:30080/orange/orange-uptime-kuma-management-tool:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GITEA_URL
              value: "http://10.24.36.10:30080"
            - name: DRONE_URL
              value: "http://10.24.36.10:30081"
            - name: SEMAPHORE_URL
              value: "http://10.24.36.10:30084"
            - name: ARGOCD_URL
              value: "http://10.24.36.10:30082"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: management-tool
  namespace: orange-kuma
  labels:
    app: management-tool
spec:
  type: NodePort
  selector:
    app: management-tool
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30087
      name: http
