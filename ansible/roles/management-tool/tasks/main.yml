      Gegenereerd: {{ ansible_date_time.iso8601 }}
      ================================================

      --- Toegang ---

      Gitea:           http://{{ k3s_server_ip }}:{{ gitea_http_port }}
                       User: {{ gitea_admin_user }} / {{ gitea_admin_password }}
                       SSH:  ssh://git@{{ k3s_server_ip }}:{{ gitea_ssh_port }}

      Drone CI:        http://{{ k3s_server_ip }}:{{ drone_port }}
                       (Login via Gitea OAuth: {{ gitea_admin_user }} / {{ gitea_admin_password }})

      Argo CD:         http://{{ k3s_server_ip }}:{{ argocd_port }}
