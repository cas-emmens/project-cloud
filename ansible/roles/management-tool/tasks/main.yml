      - "                 User: {{ gitea_admin_user }} / {{ gitea_admin_password }}"
      - "                 SSH:  ssh://git@{{ k3s_server_ip }}:{{ gitea_ssh_port }}"
      - ""
      - "Drone CI:        http://{{ k3s_server_ip }}:{{ drone_port }}"
      - "                 (Login via Gitea OAuth: {{ gitea_admin_user }} / {{ gitea_admin_password }})"
      - ""
      - "Argo CD:         http://{{ k3s_server_ip }}:{{ argocd_port }}"
      - "                 User: admin / {{ argocd_admin_password.stdout }}"
      - ""
      - "Semaphore:       http://{{ k3s_server_ip }}:{{ semaphore_port }}"
      - "                 User: admin / {{ gitea_admin_password }}"
      - ""
      - "Management Tool: http://{{ k3s_server_ip }}:{{ management_tool_port }}"
      - "                 (geen auth — read-only dashboard)"
      - ""
      - "Grafana:         http://{{ k3s_server_ip }}:{{ grafana_port }}"
      - "                 User: admin / {{ gitea_admin_password }}"
      - ""
      - "Headlamp:        http://{{ k3s_server_ip }}:{{ headlamp_port }}"
      - "                 Token: /tmp/headlamp-token.txt op de k3s-server"
      - ""
      - "Prometheus:      http://{{ k3s_server_ip }}:{{ prometheus_port }}"
      - "Alertmanager:    http://{{ k3s_server_ip }}:{{ alertmanager_port }}"
      - ""
      - "--- Klant aanmaken ---"
      - ""
      - "Via Semaphore:   http://{{ k3s_server_ip }}:{{ semaphore_port }}"
      - "                 Template: 'Nieuwe klant aanmaken' (sales)"
      - "                 Template: 'Testklant aanmaken' (ops)"
      - ""
      - "Via CLI:         ansible-playbook playbooks/provision-customer.yml"
      - "                   -e customer_name=<naam>"
      - "                   -e customer_email=<email>"
      - "                   -e admin_password=<wachtwoord>"
