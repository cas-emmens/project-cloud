---
- name: Wait for k3s install script to be reachable
  ansible.builtin.shell: curl -sf --ipv4 --max-time 10 https://get.k3s.io > /dev/null
  register: internet_check
  retries: 60
  delay: 10
  until: internet_check.rc == 0
  changed_when: false

- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install k3s server
  ansible.builtin.shell: |
    set -o pipefail
    curl -sfL --ipv4 https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      K3S_KUBECONFIG_MODE="644" \
      sh -s - server \
      --cluster-cidr={{ k3s_cluster_cidr }} \
      --service-cidr={{ k3s_service_cidr }} \
      --tls-san={{ k3s_server_ip }} \
      --disable=traefik \
      --write-kubeconfig-mode=644 \
      --node-name=k3s-server \
      --kube-controller-manager-arg=bind-address=0.0.0.0 \
      --kube-scheduler-arg=bind-address=0.0.0.0
  args:
    executable: /bin/bash
  when: not k3s_binary.stat.exists
  register: k3s_server_install
  failed_when:
    - k3s_server_install.rc != 0
    - "'D-Bus connection terminated' not in (k3s_server_install.stderr | default(''))"

- name: Wait for k3s server to be ready
  ansible.builtin.shell: |
    until kubectl get nodes 2>/dev/null | grep -q "Ready"; do
      sleep 2
    done
  timeout: 300
  changed_when: false

- name: Get k3s node token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token

- name: Store token as fact
  ansible.builtin.set_fact:
    k3s_node_token: "{{ k3s_token.content | b64decode | trim }}"

- name: Get kubeconfig
  ansible.builtin.slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: kubeconfig_raw

- name: Save external kubeconfig locally
  ansible.builtin.copy:
    content: "{{ kubeconfig_raw.content | b64decode | replace('127.0.0.1', k3s_server_ip) }}"
    dest: "{{ k3s_kubeconfig_local_path }}"
    mode: "0600"
  delegate_to: localhost
  become: false
