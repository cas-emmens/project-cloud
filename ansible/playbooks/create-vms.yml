---
# playbooks/create-vms.yml
# Phase 1: Maak k3s VMs aan op Proxmox nodes
#
# Gebruik:
#   ansible-playbook playbooks/create-vms.yml -i inventories/test
#
# Vereisten:
#   - debian-12-generic-amd64.qcow2 op elke Proxmox node (wordt gedownload indien afwezig)
#   - SSH_PUBLIC_KEY omgevingsvariabele
#   - PROXMOX_PASSWORD omgevingsvariabele

- name: Maak k3s VMs aan op Proxmox nodes
  hosts: proxmox_nodes
  gather_facts: false
  roles:
    - vm-create
