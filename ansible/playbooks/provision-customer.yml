---
# playbooks/provision-customer.yml
# Provisions a new Orange Kuma instance for a customer
#
# This playbook is designed to be run from Semaphore UI by a verkoper.
# Semaphore will prompt for the required variables.
#
# Usage (CLI):
#   ansible-playbook playbooks/provision-customer.yml \
#     -e customer_name=acme \
#     -e customer_admin_password=SecurePass123
#
# Usage (Semaphore):
#   Create a template with survey variables: customer_name, customer_admin_password

- name: Provision new Orange Kuma customer instance
  hosts: k3s_server
  become: true
  vars:
    k3s_server_ip: "10.24.36.10"
    template_path: "../k8s/orange-kuma/customer-template.yml"

  vars_prompt:
    - name: customer_name
      prompt: "Customer name (lowercase, no spaces)"
      private: false
      when: customer_name is not defined

    - name: customer_admin_password
      prompt: "Admin password for this customer's Orange Kuma"
      private: true
      when: customer_admin_password is not defined

  tasks:
    - name: Validate customer name
      assert:
        that:
          - customer_name is regex("^[a-z0-9][a-z0-9-]*[a-z0-9]$")
          - customer_name | length >= 2
          - customer_name | length <= 30
        fail_msg: "Customer name must be 2-30 chars, lowercase alphanumeric and hyphens only"

    - name: Check if customer namespace already exists
      shell: kubectl get namespace customer-{{ customer_name }} 2>/dev/null
      register: ns_check
      failed_when: false
      changed_when: false

    - name: Fail if customer already exists
      fail:
        msg: "Customer '{{ customer_name }}' already exists! Use the update playbook instead."
      when: ns_check.rc == 0

    - name: Label the monitoring namespace (needed for NetworkPolicy)
      shell: |
        kubectl label namespace monitoring kubernetes.io/metadata.name=monitoring --overwrite
      changed_when: false

    - name: Generate customer manifests from template
      shell: |
        sed 's/{{ '{{' }} CUSTOMER_NAME {{ '}}' }}/{{ customer_name }}/g' \
          {{ template_path }} | kubectl apply -f -
      args:
        chdir: "{{ playbook_dir }}"
      register: deploy_result

    - name: Wait for Orange Kuma to be ready
      shell: |
        kubectl -n customer-{{ customer_name }} rollout status deploy/orange-kuma --timeout=120s
      changed_when: false

    - name: Get assigned NodePort
      shell: |
        kubectl -n customer-{{ customer_name }} get svc orange-kuma \
          -o jsonpath='{.spec.ports[0].nodePort}'
      register: node_port
      changed_when: false

    - name: Wait for Orange Kuma to respond
      uri:
        url: "http://{{ k3s_server_ip }}:{{ node_port.stdout }}/"
        status_code: 200
      retries: 12
      delay: 5
      register: health_check
      until: health_check.status == 200

    - name: Setup admin account via API
      uri:
        url: "http://{{ k3s_server_ip }}:{{ node_port.stdout }}/api/setup"
        method: POST
        body_format: json
        body:
          username: "admin"
          password: "{{ customer_admin_password }}"
        status_code: [200, 210]
      register: setup_result
      failed_when: false

    - name: Print customer access details
      debug:
        msg: |
          ============================================
          Customer '{{ customer_name }}' provisioned!
          ============================================

          URL:      http://{{ k3s_server_ip }}:{{ node_port.stdout }}
          Username: admin
          Password: (as provided)

          Namespace: customer-{{ customer_name }}
          ============================================

---
# Also add to Argo CD for GitOps management
- name: Register customer in Argo CD
  hosts: k3s_server
  become: true
  tasks:
    - name: Create Argo CD Application for customer
      shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: orange-kuma-{{ customer_name }}
          namespace: argocd
          labels:
            app: orange-kuma
            customer: "{{ customer_name }}"
        spec:
          project: default
          source:
            repoURL: http://gitea-http.gitea.svc:3000/gitea_admin/orange-kuma-customers.git
            targetRevision: HEAD
            path: customers/{{ customer_name }}
          destination:
            server: https://kubernetes.default.svc
            namespace: customer-{{ customer_name }}
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
        EOF
      failed_when: false
