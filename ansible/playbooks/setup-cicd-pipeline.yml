---
# playbooks/setup-cicd-pipeline.yml
# Phase 4: Setup CI/CD pipeline, importeer repositories, trigger builds,
#          en deploy de Orange Kuma Management Tool naar Kubernetes.
#
# Vereist: bootstrap-platform.yml moet eerst zijn uitgevoerd (Phase 3).
#
# Gebruik:
#   ansible-playbook playbooks/setup-cicd-pipeline.yml
#   ./deploy.sh --phase 4
#
# Environment variables: geen extra variabelen nodig.
# Alle credentials worden gelezen uit de bestaande k8s secrets en
# bootstrap-configuratie.
#
# Idempotent: opnieuw draaien maakt geen duplicaten aan.

- name: Configure Gitea container registry on all k3s nodes
  hosts: k3s_server:k3s_agents
  become: true
  tasks:
    - name: Ensure /etc/rancher/k3s directory exists
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    - name: Configure containerd insecure registry for Gitea
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/registries.yaml
        content: |
          mirrors:
            "{{ k3s_server_ip }}:{{ gitea_http_port }}":
              endpoint:
                - "http://{{ k3s_server_ip }}:{{ gitea_http_port }}"
        mode: "0644"
      register: registry_config

    - name: Restart k3s server if registry config changed
      ansible.builtin.systemd:
        name: k3s
        state: restarted
      when:
        - registry_config.changed
        - inventory_hostname in groups['k3s_server']

    - name: Restart k3s agent if registry config changed
      ansible.builtin.systemd:
        name: k3s-agent
        state: restarted
      when:
        - registry_config.changed
        - inventory_hostname in groups['k3s_agents']

    - name: Wait for k3s to be ready after restart
      ansible.builtin.shell: |
        kubectl get nodes 2>/dev/null | grep -c Ready
      register: nodes_ready
      retries: 12
      delay: 10
      until: nodes_ready.stdout | int >= 1
      when:
        - registry_config.changed
        - inventory_hostname in groups['k3s_server']
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Setup CI/CD pipeline and deploy management tool
  hosts: k3s_server
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  vars:
    # Poort waarop de management tool container intern luistert (zie server.js: PORT, default 4000).
    management_tool_container_port: 4000
    repos:
      - name: orange-uptime-kuma
        github_url: https://github.com/danielpastoor/orange-uptime-kuma
        default_branch: main
      - name: orange-uptime-kuma-management-tool
        github_url: https://github.com/danielpastoor/orange-uptime-kuma-management-tool
        default_branch: main
    management_tool_repo: orange-uptime-kuma-management-tool
    management_tool_image: "{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/orange-uptime-kuma-management-tool:latest"

  tasks:
    - name: Wait for Gitea API to be responsive
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/version"
        status_code: 200
      register: gitea_health
      retries: 12
      delay: 10
      until: gitea_health.status == 200
      failed_when: gitea_health.status != 200
      vars:
        ansible_python_interpreter: /usr/bin/python3

    - name: Verify Gitea is reachable
      ansible.builtin.fail:
        msg: >
          Gitea is niet bereikbaar op http://localhost:{{ gitea_http_port }}.
          Controleer of Phase 3 (bootstrap-platform.yml) succesvol is uitgevoerd.
      when: gitea_health.status is defined and gitea_health.status != 200

    - name: Wait for Drone CI to be responsive
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/healthz"
        status_code: 200
      register: drone_health
      retries: 12
      delay: 10
      until: drone_health.status == 200
      failed_when: drone_health.status != 200

    - name: Verify Drone is reachable
      ansible.builtin.fail:
        msg: >
          Drone CI is niet bereikbaar op http://localhost:{{ drone_port }}.
          Controleer of de drone-server deployment actief is.
      when: drone_health.status is defined and drone_health.status != 200

    - name: Get Drone admin token from k8s secret
      ansible.builtin.shell: |
        set -o pipefail
        kubectl -n drone get secret drone-secrets \
          -o jsonpath='{.data.DRONE_ADMIN_TOKEN}' | base64 -d
      args:
        executable: /bin/bash
      register: drone_token_raw
      changed_when: false
      failed_when: drone_token_raw.stdout == ''

    - name: Fail if Drone admin token is not set
      ansible.builtin.fail:
        msg: >
          DRONE_ADMIN_TOKEN is leeg. Zorg dat bootstrap-platform.yml (Phase 3)
          opnieuw is uitgevoerd na de laatste update.
      when: drone_token_raw.stdout == ''

    - name: Set drone_admin_token fact
      ansible.builtin.set_fact:
        drone_admin_token: "{{ drone_token_raw.stdout }}"

    - name: Check if Gitea organization exists
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/orgs/{{ gitea_org }}"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [200, 404]
      register: org_check

    - name: Create Gitea organization
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/orgs"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          username: "{{ gitea_org }}"
          visibility: public
          description: "Orange Kuma platform repositories"
        status_code: 201
      when: org_check.status == 404
      register: org_create

    - name: Log organization status
      ansible.builtin.debug:
        msg: >
          Gitea organisatie '{{ gitea_org }}':
          {{ 'aangemaakt' if org_check.status == 404 else 'bestaat al' }}.

    - name: Check if repositories exist in Gitea
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/{{ gitea_org }}/{{ item.name }}"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [200, 404]
      register: repo_checks
      loop: "{{ repos }}"

    - name: Import repositories from GitHub to Gitea
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/migrate"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          clone_addr: "{{ item.item.github_url }}"
          repo_name: "{{ item.item.name }}"
          repo_owner: "{{ gitea_org }}"
          mirror: false
          private: false
          description: "Imported from {{ item.item.github_url }}"
          wiki: false
          milestones: false
          labels: false
          issues: false
          pull_requests: false
          releases: false
        status_code: 201
      loop: "{{ repo_checks.results }}"
      when: item.status == 404
      register: repo_imports

    - name: Wait for repositories to be available (migration is async)
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/{{ gitea_org }}/{{ item.name }}"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: 200
      register: repo_ready_check
      retries: 18
      delay: 10
      until: repo_ready_check.status == 200
      loop: "{{ repos }}"
      changed_when: false

    - name: Log repository status
      ansible.builtin.debug:
        msg: "Repository '{{ item.item.name }}': beschikbaar in Gitea."
      loop: "{{ repo_ready_check.results }}"

    - name: List existing Gitea tokens for admin user
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/users/{{ gitea_admin_user }}/tokens"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [200]
      register: gitea_existing_tokens
      changed_when: false

    - name: Delete existing drone-oauth token in Gitea if present
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/users/{{ gitea_admin_user }}/tokens/{{ item.id }}"
        method: DELETE
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [204]
      loop: "{{ gitea_existing_tokens.json | selectattr('name', 'equalto', 'drone-oauth') | list }}"
      changed_when: true

    - name: Create Gitea personal access token for Drone repository sync
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/users/{{ gitea_admin_user }}/tokens"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "drone-oauth"
          scopes:
            - "write:repository"
            - "write:organization"
            - "write:user"
            - "write:admin"
        status_code: [201]
      register: gitea_drone_pat

    - name: Inject Gitea OAuth token into Drone database to enable repo sync
      ansible.builtin.shell: |
        GITEA_TOKEN="{{ gitea_drone_pat.json.sha1 }}"
        GITEA_USER="{{ gitea_admin_user }}"
        DRONE_POD=$(kubectl -n drone get pods -l app=drone-server \
          -o jsonpath='{.items[0].metadata.name}')
        kubectl -n drone exec "$DRONE_POD" -- \
          sh -c "command -v sqlite3 >/dev/null 2>&1 || apk add -q sqlite >/dev/null 2>&1"
        kubectl -n drone exec "$DRONE_POD" -- \
          sqlite3 /data/database.sqlite \
          "UPDATE users SET user_oauth_token='${GITEA_TOKEN}' WHERE user_login='${GITEA_USER}'"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Restart Drone server to clear in-memory user cache
      ansible.builtin.shell: |
        kubectl -n drone rollout restart deploy/drone-server
        kubectl -n drone rollout status deploy/drone-server --timeout=120s
      changed_when: true

    - name: Wait for Drone to be responsive again after restart
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/healthz"
        status_code: 200
      register: drone_health_post_restart
      retries: 30
      delay: 5
      until: drone_health_post_restart.status == 200

    # The runner connects to drone-server via the Kubernetes service.
    # When drone-server is restarted, the runner's persistent RPC
    # connection breaks and it stops picking up new builds. Restart
    # the runner so it reconnects to the fresh drone-server pod.
    - name: Restart Drone runner to reconnect to fresh drone-server
      ansible.builtin.shell: |
        kubectl -n drone rollout restart deploy/drone-runner-docker
        kubectl -n drone rollout status deploy/drone-runner-docker --timeout=120s
      changed_when: true

    # Drone's /api/user/repos?flush=true sync silently fails when triggered
    # via the API (it requires the interactive OAuth browser session).
    # As a workaround, fetch each repo's metadata from Gitea and INSERT
    # directly into Drone's repos table. The activation API will then
    # find the rows and complete activation + webhook creation normally.

    - name: Fetch repo metadata from Gitea for direct DB insert
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/{{ gitea_org }}/{{ item.name }}"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [200]
      register: gitea_repo_details
      loop: "{{ repos }}"

    - name: Ensure sqlite3 is available in Drone pod (lost on restart)
      ansible.builtin.shell: |
        DRONE_POD=$(kubectl -n drone get pods -l app=drone-server \
          -o jsonpath='{.items[0].metadata.name}')
        kubectl -n drone exec "$DRONE_POD" -- \
          sh -c 'command -v sqlite3 >/dev/null 2>&1 || apk add -q sqlite >/dev/null 2>&1'
      args:
        executable: /bin/bash
      changed_when: true

    - name: Get Drone admin user_id from database
      ansible.builtin.shell: |
        DRONE_POD=$(kubectl -n drone get pods -l app=drone-server \
          -o jsonpath='{.items[0].metadata.name}')
        kubectl -n drone exec "$DRONE_POD" -- \
          sqlite3 /data/database.sqlite \
          "SELECT user_id FROM users WHERE user_login='{{ gitea_admin_user }}'"
      register: drone_user_id_query
      changed_when: false

    - name: Insert each repo directly into Drone's repos table
      ansible.builtin.shell: |
        DRONE_POD=$(kubectl -n drone get pods -l app=drone-server \
          -o jsonpath='{.items[0].metadata.name}')
        SIGNER=$(openssl rand -hex 16)
        SECRET=$(openssl rand -hex 16)
        NOW=$(date +%s)
        kubectl -n drone exec "$DRONE_POD" -- sqlite3 /data/database.sqlite "
        INSERT OR REPLACE INTO repos (
          repo_uid, repo_user_id, repo_namespace, repo_name, repo_slug,
          repo_scm, repo_clone_url, repo_ssh_url, repo_html_url,
          repo_active, repo_private, repo_visibility, repo_branch,
          repo_counter, repo_config, repo_timeout, repo_trusted, repo_protected,
          repo_synced, repo_created, repo_updated, repo_version,
          repo_signer, repo_secret,
          repo_no_forks, repo_no_pulls, repo_cancel_pulls, repo_cancel_push,
          repo_throttle, repo_cancel_running
        ) VALUES (
          '{{ item.json.id }}', {{ drone_user_id_query.stdout | int }},
          '{{ gitea_org }}', '{{ item.json.name }}',
          '{{ gitea_org }}/{{ item.json.name }}',
          'git',
          '{{ item.json.clone_url | replace("localhost", k3s_server_ip) }}',
          '{{ item.json.ssh_url }}',
          '{{ item.json.html_url | replace("localhost", k3s_server_ip) }}',
          0, {{ 1 if item.json.private else 0 }},
          '{{ "private" if item.json.private else "public" }}',
          '{{ item.json.default_branch }}',
          0, '.drone.yml', 60, 0, 0,
          $NOW, $NOW, $NOW, 1,
          '$SIGNER', '$SECRET',
          0, 0, 0, 0, 0, 0
        );
        "
      args:
        executable: /bin/bash
      loop: "{{ gitea_repo_details.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      changed_when: true

    - name: Activate repositories in Drone CI
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/repos/{{ gitea_org }}/{{ item.name }}"
        method: POST
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
        status_code: [200, 409]
      loop: "{{ repos }}"
      register: drone_activate
      changed_when: false

    - name: Log Drone activation status
      ansible.builtin.debug:
        msg: >
          Drone CI repo '{{ item.item.name }}':
          {{ 'geactiveerd' if item.status == 200 else 'was al actief' }}.
      loop: "{{ drone_activate.results }}"

    # Drone org-level secrets require the org to exist in Drone's namespace,
    # which is only populated via the broken sync. Use repo-level secrets
    # instead — repos exist in Drone's DB (via our direct INSERT), and the
    # .drone.yml in each repo references secrets by name regardless of scope.
    - name: Set Gitea registry credentials as Drone repo secrets
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/repos/{{ gitea_org }}/{{ item.0.name }}/secrets"
        method: POST
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
        body_format: json
        body:
          name: "{{ item.1.name }}"
          data: "{{ item.1.value }}"
          pull_request: false
        status_code: [200, 201, 409]
      loop: "{{ repos | product(drone_secret_pairs) | list }}"
      loop_control:
        label: "{{ item.0.name }} / {{ item.1.name }}"
      vars:
        drone_secret_pairs:
          - { name: "GITEA_REGISTRY",          value: "{{ k3s_server_ip }}:{{ gitea_http_port }}" }
          - { name: "GITEA_REGISTRY_USERNAME", value: "{{ gitea_admin_user }}" }
          - { name: "GITEA_REGISTRY_PASSWORD", value: "{{ gitea_admin_password }}" }
          - { name: "KUMA_IMAGE_REPO",         value: "{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/orange-uptime-kuma" }
          - { name: "MGMT_IMAGE_REPO",         value: "{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/orange-uptime-kuma-management-tool" }
      changed_when: false

    # Drone's POST /api/repos/.../builds creates a build with event=custom,
    # which gets skipped by any pipeline that has trigger.event: [push].
    # Triggering via a real Gitea push event fires the webhook with
    # event=push, which the pipelines accept. Both .drone.yml files in
    # these repos use branch: main, so we push to main regardless of the
    # repo's actual default branch.

    - name: Ensure main branch exists in each repo (created from default)
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/{{ gitea_org }}/{{ item.json.name }}/branches"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          new_branch_name: "main"
          old_branch_name: "{{ item.json.default_branch }}"
        status_code: [201, 409]
      loop: "{{ gitea_repo_details.results }}"
      loop_control:
        label: "{{ item.json.name }}"
      changed_when: false

    - name: Commit trigger file to main to fire build webhook
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/{{ gitea_org }}/{{ item.json.name }}/contents/.deploy-trigger-{{ ansible_date_time.epoch }}"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          message: "chore: trigger initial CI build"
          content: "{{ ('deploy ' ~ ansible_date_time.iso8601) | b64encode }}"
          branch: "main"
        status_code: [201]
      loop: "{{ gitea_repo_details.results }}"
      loop_control:
        label: "{{ item.json.name }}"

    - name: Wait for build to appear in Drone for each repo
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/repos/{{ gitea_org }}/{{ item.json.name }}/builds"
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
        status_code: [200]
      register: build_list_results
      retries: 12
      delay: 5
      until: build_list_results.json | length > 0
      loop: "{{ gitea_repo_details.results }}"
      loop_control:
        label: "{{ item.json.name }}"
      changed_when: false

    - name: Store build numbers (most recent build per repo)
      ansible.builtin.set_fact:
        build_numbers: >-
          {{ build_numbers | default({})
             | combine({item.item.json.name: item.json[0].number}) }}
      loop: "{{ build_list_results.results }}"
      loop_control:
        label: "{{ item.item.json.name }}"

    - name: Log triggered builds
      ansible.builtin.debug:
        msg: "Build #{{ build_numbers[item.json.name] }} getriggerd voor '{{ item.json.name }}'."
      loop: "{{ gitea_repo_details.results }}"
      loop_control:
        label: "{{ item.json.name }}"

    - name: Wait for builds to complete (max 30 min per build)
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/repos/{{ gitea_org }}/{{ item.json.name }}/builds/{{ build_numbers[item.json.name] }}"
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
        status_code: 200
      register: build_status
      until: build_status.json.status in ['success', 'failure', 'error', 'killed']
      retries: 60
      delay: 30
      loop: "{{ gitea_repo_details.results }}"
      loop_control:
        label: "{{ item.json.name }}"
      changed_when: false

    - name: Fail if any build did not succeed
      ansible.builtin.fail:
        msg: >
          Build #{{ build_numbers[item.item.json.name] }} voor '{{ item.item.json.name }}'
          is mislukt met status: {{ item.json.status }}.
          Controleer de Drone CI logs op http://{{ k3s_server_ip }}:{{ drone_port }}/{{ gitea_org }}/{{ item.item.json.name }}.
      loop: "{{ build_status.results }}"
      loop_control:
        label: "{{ item.item.json.name }}"
      when: item.json.status != 'success'

    - name: Log successful builds
      ansible.builtin.debug:
        msg: "Build #{{ build_numbers[item.item.json.name] }} voor '{{ item.item.json.name }}' succesvol afgerond."
      loop: "{{ build_status.results }}"
      loop_control:
        label: "{{ item.item.json.name }}"

    - name: Copy management tool manifest to server
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../k8s/management-tool/deployment.yml"
        dest: /tmp/management-tool-deployment.yml
        mode: "0644"

    - name: Apply management tool Kubernetes resources
      ansible.builtin.shell: |
        kubectl apply -f /tmp/management-tool-deployment.yml
      register: mgmt_apply
      changed_when: "'configured' in mgmt_apply.stdout or 'created' in mgmt_apply.stdout"

    - name: Wait for management tool deployment to be ready
      ansible.builtin.shell: |
        kubectl -n orange-kuma rollout status deploy/management-tool --timeout=180s
      changed_when: false
      register: mgmt_rollout
      failed_when: mgmt_rollout.rc != 0

    - name: Get management tool NodePort
      ansible.builtin.shell: |
        kubectl -n orange-kuma get svc management-tool \
          -o jsonpath='{.spec.ports[0].nodePort}'
      register: mgmt_nodeport
      changed_when: false

    - name: Check management tool web interface is reachable
      ansible.builtin.uri:
        url: "http://localhost:{{ mgmt_nodeport.stdout }}/"
        status_code: [200, 301, 302, 403, 404]
      register: mgmt_health
      retries: 12
      delay: 10
      until: mgmt_health.status in [200, 301, 302, 403, 404]
      failed_when: false

    - name: Log management tool accessibility
      ansible.builtin.debug:
        msg: >
          Management Tool web interface: HTTP {{ mgmt_health.status | default('onbekend') }}
          — bereikbaar op http://{{ k3s_server_ip }}:{{ mgmt_nodeport.stdout }}.
      when: mgmt_health is defined

    - name: Print CI/CD pipeline setup summary
      ansible.builtin.debug:
        msg: |
          ============================================
          Phase 4 — CI/CD Pipeline Setup Voltooid!
          ============================================

          Gitea Organisatie:
            http://{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}

          Repositories:
          {% for repo in repos %}
            {{ repo.name }}:
              http://{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/{{ repo.name }}
          {% endfor %}

          Drone CI Builds:
            http://{{ k3s_server_ip }}:{{ drone_port }}/{{ gitea_org }}

          Management Tool (marketing UI):
            http://{{ k3s_server_ip }}:{{ management_tool_port }}
            Namespace: orange-kuma / deployment: management-tool

          ============================================
          Verificatie:
            kubectl -n orange-kuma get deploy management-tool
            kubectl -n orange-kuma get svc management-tool
          ============================================
