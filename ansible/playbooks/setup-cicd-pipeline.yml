---
# playbooks/setup-cicd-pipeline.yml
# Phase 4: Setup CI/CD pipeline, importeer repositories, trigger builds,
#          en deploy de Orange Kuma Management Tool naar Kubernetes.
#
# Vereist: bootstrap-platform.yml moet eerst zijn uitgevoerd (Phase 3).
#
# Gebruik:
#   ansible-playbook playbooks/setup-cicd-pipeline.yml
#   ./deploy.sh --phase 4
#
# Environment variables: geen extra variabelen nodig.
# Alle credentials worden gelezen uit de bestaande k8s secrets en
# bootstrap-configuratie.
#
# Idempotent: opnieuw draaien maakt geen duplicaten aan.

- name: Configure Gitea container registry on all k3s nodes
  hosts: k3s_server:k3s_agents
  become: true
  tasks:
    - name: Ensure /etc/rancher/k3s directory exists
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    - name: Configure containerd insecure registry for Gitea
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/registries.yaml
        content: |
          mirrors:
            "{{ k3s_server_ip }}:{{ gitea_http_port }}":
              endpoint:
                - "http://{{ k3s_server_ip }}:{{ gitea_http_port }}"
        mode: "0644"
      register: registry_config

    - name: Restart k3s server if registry config changed
      ansible.builtin.systemd:
        name: k3s
        state: restarted
      when:
        - registry_config.changed
        - inventory_hostname in groups['k3s_server']

    - name: Restart k3s agent if registry config changed
      ansible.builtin.systemd:
        name: k3s-agent
        state: restarted
      when:
        - registry_config.changed
        - inventory_hostname in groups['k3s_agents']

    - name: Wait for k3s to be ready after restart
      ansible.builtin.shell: |
        kubectl get nodes 2>/dev/null | grep -c Ready
      register: nodes_ready
      retries: 12
      delay: 10
      until: nodes_ready.stdout | int >= 1
      when:
        - registry_config.changed
        - inventory_hostname in groups['k3s_server']
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Setup CI/CD pipeline and deploy management tool
  hosts: k3s_server
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  vars:
    # Poort waarop de management tool container intern luistert (zie server.js: PORT, default 4000).
    management_tool_container_port: 4000
    repos:
      - name: orange-uptime-kuma
        github_url: https://github.com/danielpastoor/orange-uptime-kuma
        default_branch: main
      - name: orange-uptime-kuma-management-tool
        github_url: https://github.com/danielpastoor/orange-uptime-kuma-management-tool
        default_branch: main
    # Gitea kan een bestaande normale repository niet achteraf naar een
    # pull mirror omzetten; phase 4 herstelt die foutieve imports daarom
    # door ze opnieuw te migreren als mirror.
    recreate_imported_repos_as_mirrors: true
    management_tool_repo: orange-uptime-kuma-management-tool
    management_tool_image: "{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/orange-uptime-kuma-management-tool:latest"

  tasks:
    - name: Wait for Gitea API to be responsive
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/version"
        status_code: 200
      register: gitea_health
      retries: 12
      delay: 10
      until: gitea_health.status == 200
      failed_when: gitea_health.status != 200
      vars:
        ansible_python_interpreter: /usr/bin/python3

    - name: Verify Gitea is reachable
      ansible.builtin.fail:
        msg: >
          Gitea is niet bereikbaar op http://localhost:{{ gitea_http_port }}.
          Controleer of Phase 3 (bootstrap-platform.yml) succesvol is uitgevoerd.
      when: gitea_health.status is defined and gitea_health.status != 200

    - name: Wait for Drone CI to be responsive
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/healthz"
        status_code: 200
      register: drone_health
      retries: 12
      delay: 10
      until: drone_health.status == 200
      failed_when: drone_health.status != 200

    - name: Verify Drone is reachable
      ansible.builtin.fail:
        msg: >
          Drone CI is niet bereikbaar op http://localhost:{{ drone_port }}.
          Controleer of de drone-server deployment actief is.
      when: drone_health.status is defined and drone_health.status != 200

    # Try to read the existing Drone admin token from the k8s secret.
    # If the secret was not created by Phase 3 (or was lost), generate a
    # new one and create the secret so Phase 4 can continue.
    - name: Get Drone admin token from k8s secret (or create if missing)
      ansible.builtin.shell: |
        set -o pipefail
        EXISTING=$(kubectl -n drone get secret drone-secrets \
          -o jsonpath='{.data.DRONE_ADMIN_TOKEN}' 2>/dev/null | base64 -d)
        if [ -z "$EXISTING" ]; then
          # Secret missing or empty — generate a new admin token
          DRONE_ADMIN_TOKEN=$(openssl rand -hex 32)
          kubectl -n drone create secret generic drone-secrets \
            --from-literal=DRONE_RPC_SECRET="$DRONE_ADMIN_TOKEN" \
            --from-literal=DRONE_ADMIN_TOKEN="$DRONE_ADMIN_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "$DRONE_ADMIN_TOKEN"
        else
          echo "$EXISTING"
        fi
      args:
        executable: /bin/bash
      register: drone_token_raw
      changed_when: false
      failed_when: drone_token_raw.stdout == ''

    - name: Set drone_admin_token fact
      ansible.builtin.set_fact:
        drone_admin_token: "{{ drone_token_raw.stdout }}"

    # The Gitea API is reached over the NodePort (localhost:30080), so a
    # transient kube-proxy/NodePort blip on the server->agent path can make
    # a single request fail with "Connection refused" even though Gitea is
    # healthy. Every Gitea API task below uses retries/until so one flaky
    # request does not abort the whole play.
    - name: Check if Gitea organization exists
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/orgs/{{ gitea_org }}"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [200, 404]
      register: org_check
      retries: 10
      delay: 6
      until: org_check.status in [200, 404]

    - name: Create Gitea organization
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/orgs"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          username: "{{ gitea_org }}"
          visibility: public
          description: "Orange Kuma platform repositories"
        status_code: 201
      when: org_check.status == 404
      register: org_create
      retries: 10
      delay: 6
      until: org_create.status == 201

    - name: Log organization status
      ansible.builtin.debug:
        msg: >
          Gitea organisatie '{{ gitea_org }}':
          {{ 'aangemaakt' if org_check.status == 404 else 'bestaat al' }}.

    - name: Check if repositories exist in Gitea
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/{{ gitea_org }}/{{ item.name }}"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [200, 404]
      register: repo_checks
      retries: 10
      delay: 6
      until: repo_checks.status in [200, 404]
      loop: "{{ repos }}"

    - name: Fail if existing repositories are not mirrors and recreation is disabled
      ansible.builtin.fail:
        msg: >
          Repository '{{ item.item.name }}' bestaat al in Gitea, maar is geen
          pull mirror. Gitea kan bestaande repositories niet omzetten naar
          pull mirrors; verwijder de repository of zet
          recreate_imported_repos_as_mirrors=true.
      loop: "{{ repo_checks.results }}"
      when:
        - item.status == 200
        - not (item.json.mirror | default(false) | bool)
        - not (recreate_imported_repos_as_mirrors | bool)

    - name: Remove existing non-mirror repositories before mirror migration
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/{{ gitea_org }}/{{ item.item.name }}"
        method: DELETE
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: 204
      loop: "{{ repo_checks.results }}"
      when:
        - item.status == 200
        - not (item.json.mirror | default(false) | bool)
        - recreate_imported_repos_as_mirrors | bool

    - name: Import repository mirrors from GitHub to Gitea
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/migrate"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          clone_addr: "{{ item.item.github_url }}"
          repo_name: "{{ item.item.name }}"
          repo_owner: "{{ gitea_org }}"
          mirror: true
          private: false
          description: "Mirrored from {{ item.item.github_url }}"
          wiki: false
          milestones: false
          labels: false
          issues: false
          pull_requests: false
          releases: false
        status_code: 201
      loop: "{{ repo_checks.results }}"
      when: >
        item.status == 404 or
        (
          item.status == 200 and
          not (item.json.mirror | default(false) | bool) and
          recreate_imported_repos_as_mirrors | bool
        )
      register: repo_imports
      retries: 10
      delay: 6
      until: repo_imports.status == 201

    - name: Wait for repositories to be available (migration is async)
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/{{ gitea_org }}/{{ item.name }}"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: 200
      register: repo_ready_check
      retries: 18
      delay: 10
      until: repo_ready_check.status == 200
      loop: "{{ repos }}"
      changed_when: false

    - name: Verify repositories are configured as Gitea mirrors
      ansible.builtin.fail:
        msg: >
          Repository '{{ item.item.name }}' is beschikbaar, maar Gitea meldt
          mirror=false. De repository moet als pull mirror zijn gemigreerd.
      loop: "{{ repo_ready_check.results }}"
      when: not (item.json.mirror | default(false) | bool)

    - name: Log repository status
      ansible.builtin.debug:
        msg: "Repository '{{ item.item.name }}': beschikbaar als Gitea mirror."
      loop: "{{ repo_ready_check.results }}"

    # ----------------------------------------------------------------
    # GitOps repos for Argo CD
    # ----------------------------------------------------------------
    # Two empty Gitea repos that Argo CD reconciles into the cluster.
    # - customer-instances: filled by the sales Semaphore template
    #   (production customers). Sync source for the customer-instances
    #   Argo CD Application.
    # - test-customers:     filled by the ops Semaphore template
    #   (test/QA customers). Same Application shape, separate audit
    #   stream so test data does not pollute sales figures.
    # auto_init: true gives Argo CD a README to discover so each
    # Application reaches Synced/Healthy immediately, even when no
    # customer manifests exist yet.
    - name: Ensure GitOps repositories exist in Gitea
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/orgs/{{ gitea_org }}/repos"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "{{ item.name }}"
          description: "{{ item.description }}"
          default_branch: "main"
          auto_init: true
          private: false
        status_code: [201, 409]
      loop:
        - name: customer-instances
          description: "Sales-provisioned customer Uptime Kuma instances"
        - name: test-customers
          description: "Ops-provisioned test customer instances"
      loop_control:
        label: "{{ item.name }}"
      register: gitops_repo_create
      retries: 10
      delay: 6
      until: gitops_repo_create.status in [201, 409]
      changed_when: false

    - name: List existing Gitea tokens for admin user
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/users/{{ gitea_admin_user }}/tokens"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [200]
      register: gitea_existing_tokens
      retries: 10
      delay: 6
      until: gitea_existing_tokens.status == 200
      changed_when: false

    - name: Delete existing drone-oauth token in Gitea if present
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/users/{{ gitea_admin_user }}/tokens/{{ item.id }}"
        method: DELETE
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [204]
      loop: "{{ gitea_existing_tokens.json | selectattr('name', 'equalto', 'drone-oauth') | list }}"
      changed_when: true

    - name: Create Gitea personal access token for Drone repository sync
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/users/{{ gitea_admin_user }}/tokens"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "drone-oauth"
          scopes:
            - "write:repository"
            - "write:organization"
            - "write:user"
            - "write:admin"
        status_code: [201]
      register: gitea_drone_pat
      retries: 10
      delay: 6
      until: gitea_drone_pat.status == 201

    - name: Delete existing argocd-gitops token in Gitea if present
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/users/{{ gitea_admin_user }}/tokens/{{ item.id }}"
        method: DELETE
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [204]
      loop: "{{ gitea_existing_tokens.json | selectattr('name', 'equalto', 'argocd-gitops') | list }}"
      changed_when: true

    - name: Create Gitea personal access token for Argo CD repository sync
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/users/{{ gitea_admin_user }}/tokens"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "argocd-gitops"
          scopes:
            - "read:repository"
        status_code: [201]
      register: gitea_argocd_pat
      retries: 10
      delay: 6
      until: gitea_argocd_pat.status == 201

    - name: Inject Gitea OAuth token into Drone database to enable repo sync
      ansible.builtin.shell: |
        GITEA_TOKEN="{{ gitea_drone_pat.json.sha1 }}"
        GITEA_USER="{{ gitea_admin_user }}"
        DRONE_POD=$(kubectl -n drone get pods -l app=drone-server \
          -o jsonpath='{.items[?(@.status.phase=="Running")].metadata.name}' \
          | awk '{print $1}')
        kubectl -n drone exec "$DRONE_POD" -- \
          sh -c "command -v sqlite3 >/dev/null 2>&1 || apk add -q sqlite >/dev/null 2>&1"
        kubectl -n drone exec "$DRONE_POD" -- \
          sqlite3 /data/database.sqlite \
          "UPDATE users SET user_oauth_token='${GITEA_TOKEN}' WHERE user_login='${GITEA_USER}'"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Restart Drone server to clear in-memory user cache
      ansible.builtin.shell: |
        kubectl -n drone rollout restart deploy/drone-server
        kubectl -n drone rollout status deploy/drone-server --timeout=120s
      changed_when: true

    - name: Wait for Drone to be responsive again after restart
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/healthz"
        status_code: 200
      register: drone_health_post_restart
      retries: 30
      delay: 5
      until: drone_health_post_restart.status == 200

    # The runner connects to drone-server via the Kubernetes service.
    # When drone-server is restarted, the runner's persistent RPC
    # connection breaks and it stops picking up new builds. Restart
    # the runner so it reconnects to the fresh drone-server pod.
    - name: Restart Drone runner to reconnect to fresh drone-server
      ansible.builtin.shell: |
        kubectl -n drone rollout restart deploy/drone-runner-docker
        kubectl -n drone rollout status deploy/drone-runner-docker --timeout=120s
      changed_when: true

    # Drone's /api/user/repos?flush=true sync silently fails when triggered
    # via the API (it requires the interactive OAuth browser session).
    # As a workaround, fetch each repo's metadata from Gitea and INSERT
    # directly into Drone's repos table. The activation API will then
    # find the rows and complete activation + webhook creation normally.

    - name: Fetch repo metadata from Gitea for direct DB insert
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/{{ gitea_org }}/{{ item.name }}"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [200]
      register: gitea_repo_details
      loop: "{{ repos }}"

    - name: Ensure sqlite3 is available in Drone pod (lost on restart)
      ansible.builtin.shell: |
        DRONE_POD=$(kubectl -n drone get pods -l app=drone-server \
          -o jsonpath='{.items[?(@.status.phase=="Running")].metadata.name}' \
          | awk '{print $1}')
        kubectl -n drone exec "$DRONE_POD" -- \
          sh -c 'command -v sqlite3 >/dev/null 2>&1 || apk add -q sqlite >/dev/null 2>&1'
      args:
        executable: /bin/bash
      changed_when: true

    - name: Get Drone admin user_id from database
      ansible.builtin.shell: |
        DRONE_POD=$(kubectl -n drone get pods -l app=drone-server \
          -o jsonpath='{.items[?(@.status.phase=="Running")].metadata.name}' \
          | awk '{print $1}')
        kubectl -n drone exec "$DRONE_POD" -- \
          sqlite3 /data/database.sqlite \
          "SELECT user_id FROM users WHERE user_login='{{ gitea_admin_user }}'"
      register: drone_user_id_query
      changed_when: false

    - name: Insert each repo directly into Drone's repos table
      ansible.builtin.shell: |
        DRONE_POD=$(kubectl -n drone get pods -l app=drone-server \
          -o jsonpath='{.items[?(@.status.phase=="Running")].metadata.name}' \
          | awk '{print $1}')
        SIGNER=$(openssl rand -hex 16)
        SECRET=$(openssl rand -hex 16)
        NOW=$(date +%s)
        kubectl -n drone exec "$DRONE_POD" -- sqlite3 /data/database.sqlite "
        INSERT OR REPLACE INTO repos (
          repo_uid, repo_user_id, repo_namespace, repo_name, repo_slug,
          repo_scm, repo_clone_url, repo_ssh_url, repo_html_url,
          repo_active, repo_private, repo_visibility, repo_branch,
          repo_counter, repo_config, repo_timeout, repo_trusted, repo_protected,
          repo_synced, repo_created, repo_updated, repo_version,
          repo_signer, repo_secret,
          repo_no_forks, repo_no_pulls, repo_cancel_pulls, repo_cancel_push,
          repo_throttle, repo_cancel_running
        ) VALUES (
          '{{ item.json.id }}', {{ drone_user_id_query.stdout | int }},
          '{{ gitea_org }}', '{{ item.json.name }}',
          '{{ gitea_org }}/{{ item.json.name }}',
          'git',
          '{{ item.json.clone_url | replace("localhost", k3s_server_ip) }}',
          '{{ item.json.ssh_url }}',
          '{{ item.json.html_url | replace("localhost", k3s_server_ip) }}',
          0, {{ 1 if item.json.private else 0 }},
          '{{ "private" if item.json.private else "public" }}',
          '{{ item.json.default_branch }}',
          0, '.drone.yml', 60, 0, 0,
          $NOW, $NOW, $NOW, 1,
          '$SIGNER', '$SECRET',
          0, 0, 0, 0, 0, 0
        );
        "
      args:
        executable: /bin/bash
      loop: "{{ gitea_repo_details.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      changed_when: true

    - name: Activate repositories in Drone CI
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/repos/{{ gitea_org }}/{{ item.name }}"
        method: POST
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
        status_code: [200, 409]
      loop: "{{ repos }}"
      register: drone_activate
      changed_when: false

    - name: Log Drone activation status
      ansible.builtin.debug:
        msg: >
          Drone CI repo '{{ item.item.name }}':
          {{ 'geactiveerd' if item.status == 200 else 'was al actief' }}.
      loop: "{{ drone_activate.results }}"

    # Drone org-level secrets require the org to exist in Drone's namespace,
    # which is only populated via the broken sync. Use repo-level secrets
    # instead — repos exist in Drone's DB (via our direct INSERT), and the
    # .drone.yml in each repo references secrets by name regardless of scope.
    - name: Set Gitea registry credentials as Drone repo secrets
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/repos/{{ gitea_org }}/{{ item.0.name }}/secrets"
        method: POST
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
        body_format: json
        body:
          name: "{{ item.1.name }}"
          data: "{{ item.1.value }}"
          pull_request: false
        status_code: [200, 201, 409]
      loop: "{{ repos | product(drone_secret_pairs) | list }}"
      loop_control:
        label: "{{ item.0.name }} / {{ item.1.name }}"
      vars:
        drone_secret_pairs:
          - { name: "GITEA_REGISTRY",          value: "{{ k3s_server_ip }}:{{ gitea_http_port }}" }
          - { name: "GITEA_REGISTRY_USERNAME", value: "{{ gitea_admin_user }}" }
          - { name: "GITEA_REGISTRY_PASSWORD", value: "{{ gitea_admin_password }}" }
          - { name: "KUMA_IMAGE_REPO",         value: "{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/orange-uptime-kuma" }
          - { name: "MGMT_IMAGE_REPO",         value: "{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/orange-uptime-kuma-management-tool" }
      changed_when: false

    # Drone's POST /api/repos/.../builds creates a build with event=custom,
    # which gets skipped by pipelines that only accept push events. These
    # repositories are Gitea pull mirrors, so we trigger Drone through the
    # Gitea webhook test endpoint instead of writing a trigger commit.
    - name: Get existing Drone builds before triggering mirror webhooks
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/repos/{{ gitea_org }}/{{ item.json.name }}/builds"
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
        status_code: [200]
      register: build_list_before_trigger
      loop: "{{ gitea_repo_details.results }}"
      loop_control:
        label: "{{ item.json.name }}"
      changed_when: false

    - name: Store previous build numbers
      ansible.builtin.set_fact:
        previous_build_numbers: >-
          {{ previous_build_numbers | default({})
             | combine({
                 item.item.json.name: (item.json[0].number if (item.json | length > 0) else 0)
               }) }}
      loop: "{{ build_list_before_trigger.results }}"
      loop_control:
        label: "{{ item.item.json.name }}"

    - name: List Gitea hooks for Drone repositories
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/{{ gitea_org }}/{{ item.name }}/hooks"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [200]
      register: gitea_repo_hooks
      retries: 12
      delay: 5
      until: gitea_repo_hooks.json | length > 0
      loop: "{{ repos }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false

    - name: Trigger Drone builds through Gitea webhook tests
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/{{ gitea_org }}/{{ item.0.item.name }}/hooks/{{ item.1.id }}/tests"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [200, 204]
      loop: "{{ gitea_repo_hooks.results | subelements('json') }}"
      loop_control:
        label: "{{ item.0.item.name }} / hook {{ item.1.id }}"
      when:
        - "'/hook' in (item.1.config.url | default(''))"

    - name: Wait for build to appear in Drone for each repo
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/repos/{{ gitea_org }}/{{ item.json.name }}/builds"
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
        status_code: [200]
      register: build_list_results
      retries: 12
      delay: 5
      until: >
        build_list_results.json | length > 0 and
        (build_list_results.json[0].number | int) >
        (previous_build_numbers[item.json.name] | default(0) | int)
      loop: "{{ gitea_repo_details.results }}"
      loop_control:
        label: "{{ item.json.name }}"
      changed_when: false

    - name: Store build numbers (most recent build per repo)
      ansible.builtin.set_fact:
        build_numbers: >-
          {{ build_numbers | default({})
             | combine({item.item.json.name: item.json[0].number}) }}
      loop: "{{ build_list_results.results }}"
      loop_control:
        label: "{{ item.item.json.name }}"

    - name: Log triggered builds
      ansible.builtin.debug:
        msg: "Build #{{ build_numbers[item.json.name] }} getriggerd voor '{{ item.json.name }}'."
      loop: "{{ gitea_repo_details.results }}"
      loop_control:
        label: "{{ item.json.name }}"

    - name: Wait for builds to complete (max 30 min per build)
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/repos/{{ gitea_org }}/{{ item.json.name }}/builds/{{ build_numbers[item.json.name] }}"
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
        status_code: 200
      register: build_status
      until: build_status.json.status in ['success', 'failure', 'error', 'killed', 'skipped']
      retries: 60
      delay: 30
      loop: "{{ gitea_repo_details.results }}"
      loop_control:
        label: "{{ item.json.name }}"
      changed_when: false

    # We log build failures as warnings but do NOT fail the playbook.
    # The management tool deployment depends on its own image; if any
    # upstream repo build fails (e.g. due to a Dockerfile bug in that
    # repo), the deployment step below will surface a clear error
    # when it cannot pull the image. Failing a third-party build
    # should not block the rest of the platform from coming up.
    - name: Warn about builds that did not succeed
      ansible.builtin.debug:
        msg: >
          WAARSCHUWING: Build #{{ build_numbers[item.item.json.name] }} voor
          '{{ item.item.json.name }}' eindigde met status '{{ item.json.status }}'.
          Logs: http://{{ k3s_server_ip }}:{{ drone_port }}/{{ gitea_org }}/{{ item.item.json.name }}
      loop: "{{ build_status.results }}"
      loop_control:
        label: "{{ item.item.json.name }}"
      when: item.json.status != 'success'

    - name: Log successful builds
      ansible.builtin.debug:
        msg: "Build #{{ build_numbers[item.item.json.name] }} voor '{{ item.item.json.name }}' succesvol afgerond."
      loop: "{{ build_status.results }}"
      loop_control:
        label: "{{ item.item.json.name }}"
      when: item.json.status == 'success'

    # ================================================================
    # ARGO CD - Customer provisioning GitOps lanes
    # ================================================================
    # Wire Argo CD (deployed in Phase 3) to the two GitOps repos. Both
    # repos are reconciled into the cluster by separate Applications so
    # sales-provisioned customers (customer-instances) and ops-test
    # customers (test-customers) keep separate audit trails and can
    # have independent retention policies later.
    #
    # Both Applications live inside one AppProject so RBAC and resource
    # whitelists are managed in one place.
    - name: Apply Gitea repo credential Secrets in argocd namespace
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: gitea-customer-instances
          namespace: argocd
          labels:
            argocd.argoproj.io/secret-type: repository
        stringData:
          type: git
          url: http://gitea-http.gitea.svc:3000/{{ gitea_org }}/customer-instances.git
          username: {{ gitea_admin_user }}
          password: {{ gitea_argocd_pat.json.sha1 }}
        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: gitea-test-customers
          namespace: argocd
          labels:
            argocd.argoproj.io/secret-type: repository
        stringData:
          type: git
          url: http://gitea-http.gitea.svc:3000/{{ gitea_org }}/test-customers.git
          username: {{ gitea_admin_user }}
          password: {{ gitea_argocd_pat.json.sha1 }}
        EOF
      changed_when: false

    # ----------------------------------------------------------------
    # Argo CD Image Updater credentials + registry config
    # ----------------------------------------------------------------
    # The Image Updater chart was installed in Phase 3 but cannot
    # read tags from the Gitea registry until these are in place:
    #   - gitea-image-updater Secret: basic auth for /v2/... API
    #   - argocd-image-updater-config ConfigMap: registry entry
    #     declaring the Gitea registry's insecure HTTP endpoint
    #   - argocd-image-updater-ssh-config ConfigMap: known git-hosts
    #     (kept default; Image Updater uses HTTPS to Gitea over the
    #     in-cluster service for write-back)
    - name: Apply Argo CD Image Updater Gitea registry credentials
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: gitea-image-updater
          namespace: argocd
        stringData:
          username: {{ gitea_admin_user }}
          password: {{ gitea_argocd_pat.json.sha1 }}
        ---
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: argocd-image-updater-config
          namespace: argocd
        data:
          registries.conf: |
            registries:
              - name: gitea
                api_url: http://gitea-http.gitea.svc:3000
                prefix: {{ k3s_server_ip }}:{{ gitea_http_port }}
                insecure: true
                credentials: secret:argocd/gitea-image-updater#username:password
                default: true
          git.user: image-updater
          git.email: image-updater@orange-kuma.local
        EOF
      changed_when: false

    - name: Restart Argo CD Image Updater so it picks up new config
      ansible.builtin.shell: |
        kubectl -n argocd rollout restart deploy/argocd-image-updater
        kubectl -n argocd rollout status deploy/argocd-image-updater --timeout=120s
      changed_when: false

    # The AppProject destination namespace below is '*', not 'customer-*'.
    # Each Application's own destination.namespace is empty (every committed
    # manifest carries its own customer-<slug> namespace, and
    # CreateNamespace=true creates them), and 'customer-*' does not match the
    # empty string, so Argo CD would reject the Application with
    # InvalidSpecError before it ever reads the repo. Scope is still tight:
    # sourceRepos limits the input to the two customer repos,
    # clusterResourceWhitelist allows only Namespace, and
    # namespaceResourceWhitelist allows only the kinds the template ships.
    - name: Apply Argo CD AppProject for customer provisioning
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: AppProject
        metadata:
          name: customer-provisioning
          namespace: argocd
        spec:
          description: GitOps reconciliation for customer Uptime Kuma instances
          sourceRepos:
            - http://gitea-http.gitea.svc:3000/{{ gitea_org }}/customer-instances.git
            - http://gitea-http.gitea.svc:3000/{{ gitea_org }}/test-customers.git
          destinations:
            - namespace: '*'
              server: https://kubernetes.default.svc
          clusterResourceWhitelist:
            - group: ''
              kind: Namespace
          namespaceResourceWhitelist:
            - group: ''
              kind: Service
            - group: ''
              kind: PersistentVolumeClaim
            - group: ''
              kind: Secret
            - group: apps
              kind: Deployment
            - group: networking.k8s.io
              kind: NetworkPolicy
            - group: networking.k8s.io
              kind: Ingress
        EOF
      changed_when: false

    - name: Apply Argo CD Applications for the two GitOps repos
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: customer-instances
          namespace: argocd
          # Image Updater annotations: watches the kuma image in the
          # Gitea registry and when Drone publishes a new SHA tag the
          # updater commits the new image: ref into every customer
          # manifest in customer-instances. Argo CD then rolls the
          # update to all customer Deployments.
          annotations:
            argocd-image-updater.argoproj.io/image-list: "kuma={{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/orange-uptime-kuma"
            argocd-image-updater.argoproj.io/kuma.update-strategy: digest
            argocd-image-updater.argoproj.io/kuma.allow-tags: "regexp:^[0-9a-f]{7}$$|^latest$$"
            argocd-image-updater.argoproj.io/write-back-method: "git:secret:argocd/gitea-customer-instances"
            argocd-image-updater.argoproj.io/git-branch: main
        spec:
          project: customer-provisioning
          source:
            repoURL: http://gitea-http.gitea.svc:3000/{{ gitea_org }}/customer-instances.git
            targetRevision: main
            path: .
            directory:
              recurse: true
              include: 'customers/*.yaml'
          destination:
            server: https://kubernetes.default.svc
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
        ---
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: test-customers
          namespace: argocd
          annotations:
            argocd-image-updater.argoproj.io/image-list: "kuma={{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/orange-uptime-kuma"
            argocd-image-updater.argoproj.io/kuma.update-strategy: digest
            argocd-image-updater.argoproj.io/kuma.allow-tags: "regexp:^[0-9a-f]{7}$$|^latest$$"
            argocd-image-updater.argoproj.io/write-back-method: "git:secret:argocd/gitea-test-customers"
            argocd-image-updater.argoproj.io/git-branch: main
        spec:
          project: customer-provisioning
          source:
            repoURL: http://gitea-http.gitea.svc:3000/{{ gitea_org }}/test-customers.git
            targetRevision: main
            path: .
            directory:
              recurse: true
              include: 'customers/*.yaml'
          destination:
            server: https://kubernetes.default.svc
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
        EOF
      changed_when: false

    - name: Wait for Argo CD Applications to settle
      ansible.builtin.shell: |
        kubectl -n argocd wait application/customer-instances \
          --for=jsonpath='{.status.sync.status}'=Synced --timeout=60s || true
        kubectl -n argocd wait application/test-customers \
          --for=jsonpath='{.status.sync.status}'=Synced --timeout=60s || true
      changed_when: false

    # The management tool dashboard reads Argo CD Application sync/health
    # via the Argo CD API. Mint a dedicated read-only token and hand it to
    # the pod as a Secret. Idempotent: if the Secret already exists we
    # leave it (and the account) in place. Note: a full argocd helm
    # upgrade resets argocd-cm/argocd-rbac-cm, so on a non-destroy re-run
    # the account may need re-patching — a `./deploy.sh --destroy-first`
    # always reproduces this cleanly.
    - name: Mint a read-only Argo CD API token for the dashboard
      ansible.builtin.shell: |
        set -euo pipefail
        if kubectl -n orange-kuma get secret management-tool-argocd >/dev/null 2>&1; then
          echo "exists"
          exit 0
        fi
        # 1. A local account with apiKey capability (token-based access).
        kubectl -n argocd patch configmap argocd-cm --type merge \
          -p '{"data":{"accounts.dashboard":"apiKey"}}'
        # 2. Grant that account the built-in read-only role.
        kubectl -n argocd patch configmap argocd-rbac-cm --type merge \
          -p '{"data":{"policy.csv":"g, dashboard, role:readonly"}}'
        # 3. Restart so argocd-server recognises the new account.
        kubectl -n argocd rollout restart deploy/argocd-server
        kubectl -n argocd rollout status deploy/argocd-server --timeout=120s
        ADMIN_PW=$(kubectl -n argocd get secret argocd-initial-admin-secret \
          -o jsonpath='{.data.password}' | base64 -d)
        # 4. Login as admin (plaintext http; argocd-server runs insecure).
        JWT=$(curl -sf -X POST http://localhost:{{ argocd_port }}/api/v1/session \
          -H 'Content-Type: application/json' \
          -d "{\"username\":\"admin\",\"password\":\"${ADMIN_PW}\"}" \
          | python3 -c 'import sys, json; print(json.load(sys.stdin)["token"])')
        # 5. Mint a non-expiring apiKey token for the dashboard account.
        TOKEN=$(curl -sf -X POST \
          http://localhost:{{ argocd_port }}/api/v1/account/dashboard/token \
          -H "Authorization: Bearer ${JWT}" -H 'Content-Type: application/json' \
          -d '{}' \
          | python3 -c 'import sys, json; print(json.load(sys.stdin)["token"])')
        # 6. Hand the token to the dashboard via a Secret it mounts as env.
        #    Ensure the namespace exists first (the deployment manifest
        #    that normally creates it is applied just after this task).
        kubectl create namespace orange-kuma \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl -n orange-kuma create secret generic management-tool-argocd \
          --from-literal=token="${TOKEN}" \
          --dry-run=client -o yaml | kubectl apply -f -
      args:
        executable: /bin/bash
      register: argocd_dashboard_token
      changed_when: "'exists' not in argocd_dashboard_token.stdout"

    - name: Template management tool manifest to server
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../k8s/management-tool/deployment.yml.j2"
        dest: /tmp/management-tool-deployment.yml
        mode: "0644"

    - name: Apply management tool Kubernetes resources
      ansible.builtin.shell: |
        kubectl apply -f /tmp/management-tool-deployment.yml
      register: mgmt_apply
      changed_when: "'configured' in mgmt_apply.stdout or 'created' in mgmt_apply.stdout"

    - name: Wait for management tool deployment to be ready
      ansible.builtin.shell: |
        kubectl -n orange-kuma rollout status deploy/management-tool --timeout=180s
      changed_when: false
      register: mgmt_rollout
      failed_when: mgmt_rollout.rc != 0

    - name: Get management tool NodePort
      ansible.builtin.shell: |
        kubectl -n orange-kuma get svc management-tool \
          -o jsonpath='{.spec.ports[0].nodePort}'
      register: mgmt_nodeport
      changed_when: false

    - name: Check management tool web interface is reachable
      ansible.builtin.uri:
        url: "http://localhost:{{ mgmt_nodeport.stdout }}/"
        status_code: [200, 301, 302, 403, 404]
      register: mgmt_health
      retries: 12
      delay: 10
      until: mgmt_health.status in [200, 301, 302, 403, 404]
      failed_when: false

    - name: Log management tool accessibility
      ansible.builtin.debug:
        msg: >
          Management Tool web interface: HTTP {{ mgmt_health.status | default('onbekend') }}
          — bereikbaar op http://{{ k3s_server_ip }}:{{ mgmt_nodeport.stdout }}.
      when: mgmt_health is defined

    - name: Print CI/CD pipeline setup summary
      ansible.builtin.debug:
        msg: |
          ============================================
          Phase 4 — CI/CD Pipeline Setup Voltooid!
          ============================================

          Gitea Organisatie:
            http://{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}

          Repositories:
          {% for repo in repos %}
            {{ repo.name }}:
              http://{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/{{ repo.name }}
          {% endfor %}

          Drone CI Builds:
            http://{{ k3s_server_ip }}:{{ drone_port }}/{{ gitea_org }}

          Management Tool (marketing UI):
            http://{{ k3s_server_ip }}:{{ management_tool_port }}
            Namespace: orange-kuma / deployment: management-tool

          ============================================
          Verificatie:
            kubectl -n orange-kuma get deploy management-tool
            kubectl -n orange-kuma get svc management-tool
          ============================================
