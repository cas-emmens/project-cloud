---
# playbooks/setup-cicd-pipeline.yml
# Phase 4: Setup CI/CD pipeline, importeer repositories, trigger builds,
#          en deploy de Orange Kuma Management Tool naar Kubernetes.
#
# Vereist: bootstrap-platform.yml moet eerst zijn uitgevoerd (Phase 3).
#
# Gebruik:
#   ansible-playbook playbooks/setup-cicd-pipeline.yml
#   ./deploy.sh --phase 4
#
# Environment variables: geen extra variabelen nodig.
# Alle credentials worden gelezen uit de bestaande k8s secrets en
# bootstrap-configuratie.
#
# Idempotent: opnieuw draaien maakt geen duplicaten aan.

- name: Configure Gitea container registry on all k3s nodes
  hosts: k3s_server:k3s_agents
  become: true
  tasks:
    - name: Configure containerd insecure registry for Gitea
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/registries.yaml
        content: |
          mirrors:
            "{{ k3s_server_ip }}:{{ gitea_http_port }}":
              endpoint:
                - "http://{{ k3s_server_ip }}:{{ gitea_http_port }}"
        mode: "0644"
      register: registry_config

    - name: Restart k3s server if registry config changed
      ansible.builtin.systemd:
        name: k3s
        state: restarted
      when:
        - registry_config.changed
        - inventory_hostname in groups['k3s_server']

    - name: Restart k3s agent if registry config changed
      ansible.builtin.systemd:
        name: k3s-agent
        state: restarted
      when:
        - registry_config.changed
        - inventory_hostname in groups['k3s_agents']

    - name: Wait for k3s to be ready after restart
      ansible.builtin.shell: |
        set -o pipefail
        kubectl get nodes 2>/dev/null | grep -c Ready
      register: nodes_ready
      retries: 12
      delay: 10
      until: nodes_ready.stdout | int >= 1
      when:
        - registry_config.changed
        - inventory_hostname in groups['k3s_server']
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Setup CI/CD pipeline and deploy management tool
  hosts: k3s_server
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  vars:
    # Poort waarop de management tool container intern luistert (zie server.js: PORT, default 4000).
    management_tool_container_port: 4000
    repos:
      - name: orange-uptime-kuma
        github_url: https://github.com/danielpastoor/orange-uptime-kuma
        default_branch: main
      - name: orange-uptime-kuma-management-tool
        github_url: https://github.com/danielpastoor/orange-uptime-kuma-management-tool
        default_branch: main
    management_tool_repo: orange-uptime-kuma-management-tool
    management_tool_image: "{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/orange-uptime-kuma-management-tool:latest"

  tasks:
    - name: Wait for Gitea API to be responsive
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/version"
        status_code: 200
      register: gitea_health
      retries: 12
      delay: 10
      until: gitea_health.status == 200
      failed_when: gitea_health.status != 200
      vars:
        ansible_python_interpreter: /usr/bin/python3

    - name: Verify Gitea is reachable
      ansible.builtin.fail:
        msg: >
          Gitea is niet bereikbaar op http://localhost:{{ gitea_http_port }}.
          Controleer of Phase 3 (bootstrap-platform.yml) succesvol is uitgevoerd.
      when: gitea_health.status is defined and gitea_health.status != 200

    - name: Wait for Drone CI to be responsive
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/healthz"
        status_code: 200
      register: drone_health
      retries: 12
      delay: 10
      until: drone_health.status == 200
      failed_when: drone_health.status != 200

    - name: Verify Drone is reachable
      ansible.builtin.fail:
        msg: >
          Drone CI is niet bereikbaar op http://localhost:{{ drone_port }}.
          Controleer of de drone-server deployment actief is.
      when: drone_health.status is defined and drone_health.status != 200

    - name: Get Drone admin token from k8s secret
      ansible.builtin.shell: |
        set -o pipefail
        kubectl -n drone get secret drone-secrets \
          -o jsonpath='{.data.DRONE_ADMIN_TOKEN}' | base64 -d
      register: drone_token_raw
      changed_when: false
      failed_when: drone_token_raw.stdout == ''

    - name: Fail if Drone admin token is not set
      ansible.builtin.fail:
        msg: >
          DRONE_ADMIN_TOKEN is leeg. Zorg dat bootstrap-platform.yml (Phase 3)
          opnieuw is uitgevoerd na de laatste update.
      when: drone_token_raw.stdout == ''

    - name: Set drone_admin_token fact
      ansible.builtin.set_fact:
        drone_admin_token: "{{ drone_token_raw.stdout }}"

    - name: Check if Gitea organization exists
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/orgs/{{ gitea_org }}"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [200, 404]
      register: org_check

    - name: Create Gitea organization
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/orgs"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          username: "{{ gitea_org }}"
          visibility: public
          description: "Orange Kuma platform repositories"
        status_code: 201
      when: org_check.status == 404
      register: org_create

    - name: Log organization status
      ansible.builtin.debug:
        msg: >
          Gitea organisatie '{{ gitea_org }}':
          {{ 'aangemaakt' if org_check.status == 404 else 'bestaat al' }}.

    - name: Set Gitea registry credentials as Drone org secrets
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/orgsecrets/{{ gitea_org }}"
        method: POST
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
        body_format: json
        body:
          name: "{{ item.name }}"
          data: "{{ item.value }}"
          pull_request: false
        status_code: [200, 201, 409]
      loop:
        - { name: "GITEA_REGISTRY",     value: "{{ k3s_server_ip }}:{{ gitea_http_port }}" }
        - { name: "GITEA_REGISTRY_USERNAME", value: "{{ gitea_admin_user }}" }
        - { name: "GITEA_REGISTRY_PASSWORD", value: "{{ gitea_admin_password }}" }
        - { name: "KUMA_IMAGE_REPO",    value: "{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/orange-uptime-kuma" }
        - { name: "MGMT_IMAGE_REPO",    value: "{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/orange-uptime-kuma-management-tool" }
      changed_when: false

    - name: Check if repositories exist in Gitea
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/{{ gitea_org }}/{{ item.name }}"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: [200, 404]
      register: repo_checks
      loop: "{{ repos }}"

    - name: Import repositories from GitHub to Gitea
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/migrate"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          clone_addr: "{{ item.item.github_url }}"
          repo_name: "{{ item.item.name }}"
          repo_owner: "{{ gitea_org }}"
          mirror: false
          private: false
          description: "Imported from {{ item.item.github_url }}"
          wiki: false
          milestones: false
          labels: false
          issues: false
          pull_requests: false
          releases: false
        status_code: 201
      loop: "{{ repo_checks.results }}"
      when: item.status == 404
      register: repo_imports

    - name: Wait for repositories to be available (migration is async)
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}/api/v1/repos/{{ gitea_org }}/{{ item.name }}"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        status_code: 200
      register: repo_ready_check
      retries: 18
      delay: 10
      until: repo_ready_check.status == 200
      loop: "{{ repos }}"
      changed_when: false

    - name: Log repository status
      ansible.builtin.debug:
        msg: "Repository '{{ item.item.name }}': beschikbaar in Gitea."
      loop: "{{ repo_ready_check.results }}"

    - name: Sync Drone repo list from Gitea
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/user/repos?flush=true"
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
        status_code: [200, 201]
      changed_when: false

    - name: Activate repositories in Drone CI
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/repos/{{ gitea_org }}/{{ item.name }}"
        method: POST
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
        status_code: [200, 409]
      loop: "{{ repos }}"
      register: drone_activate
      changed_when: false

    - name: Log Drone activation status
      ansible.builtin.debug:
        msg: >
          Drone CI repo '{{ item.item.name }}':
          {{ 'geactiveerd' if item.status == 200 else 'was al actief' }}.
      loop: "{{ drone_activate.results }}"

    - name: Trigger first build for each repository
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/repos/{{ gitea_org }}/{{ item.name }}/builds"
        method: POST
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          branch: "{{ item.default_branch }}"
        status_code: [200, 201]
      loop: "{{ repos }}"
      register: build_triggers
      failed_when: item.status not in [200, 201]

    - name: Store build numbers
      ansible.builtin.set_fact:
        build_numbers: >-
          {{ build_numbers | default({})
             | combine({item.item.name: item.json.number}) }}
      loop: "{{ build_triggers.results }}"

    - name: Log triggered builds
      ansible.builtin.debug:
        msg: "Build #{{ build_numbers[item.name] }} getriggerd voor '{{ item.name }}'."
      loop: "{{ repos }}"

    - name: Wait for builds to complete (max 30 min per build)
      ansible.builtin.uri:
        url: "http://localhost:{{ drone_port }}/api/repos/{{ gitea_org }}/{{ item.name }}/builds/{{ build_numbers[item.name] }}"
        headers:
          Authorization: "Bearer {{ drone_admin_token }}"
        status_code: 200
      register: build_status
      until: build_status.json.status in ['success', 'failure', 'error', 'killed']
      retries: 60
      delay: 30
      loop: "{{ repos }}"
      changed_when: false

    - name: Fail if any build did not succeed
      ansible.builtin.fail:
        msg: >
          Build #{{ build_numbers[item.item.name] }} voor '{{ item.item.name }}'
          is mislukt met status: {{ item.json.status }}.
          Controleer de Drone CI logs op http://{{ k3s_server_ip }}:{{ drone_port }}/{{ gitea_org }}/{{ item.item.name }}.
      loop: "{{ build_status.results }}"
      when: item.json.status != 'success'

    - name: Log successful builds
      ansible.builtin.debug:
        msg: "Build #{{ build_numbers[item.item.name] }} voor '{{ item.item.name }}' succesvol afgerond."
      loop: "{{ build_status.results }}"

    - name: Copy management tool manifest to server
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../k8s/management-tool/deployment.yml"
        dest: /tmp/management-tool-deployment.yml
        mode: "0644"

    - name: Apply management tool Kubernetes resources
      ansible.builtin.shell: |
        kubectl apply -f /tmp/management-tool-deployment.yml
      register: mgmt_apply
      changed_when: "'configured' in mgmt_apply.stdout or 'created' in mgmt_apply.stdout"

    - name: Wait for management tool deployment to be ready
      ansible.builtin.shell: |
        kubectl -n orange-kuma rollout status deploy/management-tool --timeout=180s
      changed_when: false
      register: mgmt_rollout
      failed_when: mgmt_rollout.rc != 0

    - name: Get management tool NodePort
      ansible.builtin.shell: |
        kubectl -n orange-kuma get svc management-tool \
          -o jsonpath='{.spec.ports[0].nodePort}'
      register: mgmt_nodeport
      changed_when: false

    - name: Check management tool web interface is reachable
      ansible.builtin.uri:
        url: "http://localhost:{{ mgmt_nodeport.stdout }}/"
        status_code: [200, 301, 302, 403, 404]
      register: mgmt_health
      retries: 12
      delay: 10
      until: mgmt_health.status in [200, 301, 302, 403, 404]
      failed_when: false

    - name: Log management tool accessibility
      ansible.builtin.debug:
        msg: >
          Management Tool web interface: HTTP {{ mgmt_health.status | default('onbekend') }}
          — bereikbaar op http://{{ k3s_server_ip }}:{{ mgmt_nodeport.stdout }}.
      when: mgmt_health is defined

    - name: Print CI/CD pipeline setup summary
      ansible.builtin.debug:
        msg: |
          ============================================
          Phase 4 — CI/CD Pipeline Setup Voltooid!
          ============================================

          Gitea Organisatie:
            http://{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}

          Repositories:
          {% for repo in repos %}
            {{ repo.name }}:
              http://{{ k3s_server_ip }}:{{ gitea_http_port }}/{{ gitea_org }}/{{ repo.name }}
          {% endfor %}

          Drone CI Builds:
            http://{{ k3s_server_ip }}:{{ drone_port }}/{{ gitea_org }}

          Management Tool (marketing UI):
            http://{{ k3s_server_ip }}:{{ management_tool_port }}
            Namespace: orange-kuma / deployment: management-tool

          ============================================
          Verificatie:
            kubectl -n orange-kuma get deploy management-tool
            kubectl -n orange-kuma get svc management-tool
          ============================================
