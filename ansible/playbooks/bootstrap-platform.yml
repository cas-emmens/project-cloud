---
# playbooks/bootstrap-platform.yml
# Installs all platform services on the k3s cluster via Helm
#
# Services: Longhorn, Gitea, Drone CI, Argo CD, Prometheus+Grafana, Semaphore
#
# Usage:
#   ansible-playbook playbooks/bootstrap-platform.yml

- name: Bootstrap platform services on k3s
  hosts: k3s_server
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  # ----------------------------------------------------------------
  # Pinned chart and image versions
  # ----------------------------------------------------------------
  # Every Helm chart and floating image tag is pinned here so re-runs
  # don't silently pick up upstream breaking changes (we've already
  # been bitten by drone 2.x's port validation and DinD 24<->26 API
  # mismatches in this codebase).
  #
  # To bump a pin: read the upstream release notes, run
  #   `helm -n <ns> list -o json`
  # on a staging cluster, then update the value here in a separate
  # commit so the diff is reviewable.
  vars:
    gitea_chart_version: "10.4.1"
    argocd_chart_version: "7.6.12"
    argocd_image_updater_chart_version: "0.11.0"
    prometheus_stack_chart_version: "65.1.1"
    headlamp_chart_version: "0.27.0"
    ingress_nginx_chart_version: "4.11.3"
    semaphore_image: "semaphoreui/semaphore:v2.10.34"

  tasks:
    # =========================================
    # HELM INSTALLATION
    # =========================================
    - name: Check if helm is installed
      stat:
        path: /usr/local/bin/helm
      register: helm_binary

    - name: Install Helm
      shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: not helm_binary.stat.exists

    # =========================================
    # LONGHORN (Distributed Storage)
    # =========================================
    - name: Add Longhorn Helm repo
      shell: |
        helm repo add longhorn https://charts.longhorn.io
        helm repo update
      changed_when: false

    - name: Install Longhorn
      shell: |
        helm upgrade --install longhorn longhorn/longhorn \
          --namespace longhorn-system \
          --create-namespace \
          --wait --timeout 10m
      register: longhorn_install
      changed_when: "'has been upgraded' in longhorn_install.stdout or 'has been installed' in longhorn_install.stdout"

    - name: Remove longhorn as default StorageClass
      shell: |
        kubectl patch storageclass longhorn \
          -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'
      changed_when: false

    # =========================================
    # NAMESPACES
    # =========================================
    - name: Create namespaces
      shell: |
        kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -
      loop:
        - gitea
        - drone
        - argocd
        - monitoring
        - semaphore
        - orange-kuma
        - ingress-nginx
      changed_when: false

    # =========================================
    # GITEA (Repo Manager)
    # =========================================
    - name: Add Gitea Helm repo
      shell: |
        helm repo add gitea-charts https://dl.gitea.com/charts/
        helm repo update
      changed_when: false

    # We disable the chart's bundled Bitnami subcharts (PostgreSQL HA and
    # Redis cluster) and run Gitea on its built-in SQLite with in-process
    # cache/queue. Two reasons:
    #   1) Bitnami removed the old versioned images this chart pins
    #      (docker.io/bitnami/postgresql:16.3.0-debian-12-r23 and
    #      bitnami/redis-cluster:7.2.5-debian-12-r4 now 404 on Docker Hub),
    #      so the subcharts ImagePullBackOff and the install never readies.
    #   2) At this scale (single-node school cluster) we don't need an HA
    #      Postgres + 3-node Redis — SQLite is officially supported and
    #      keeps Gitea (incl. the container registry) fully functional.
    # Timeout is 10m: first-time image pulls on a cold cluster over the
    # school network can exceed the chart default. Re-running is idempotent.
    - name: Install Gitea
      shell: |
        helm upgrade --install gitea gitea-charts/gitea \
          --namespace gitea \
          --version {{ gitea_chart_version }} \
          --set service.http.type=NodePort \
          --set service.http.nodePort={{ gitea_http_port }} \
          --set service.ssh.type=NodePort \
          --set service.ssh.nodePort={{ gitea_ssh_port }} \
          --set gitea.admin.username={{ gitea_admin_user }} \
          --set gitea.admin.password={{ gitea_admin_password }} \
          --set gitea.admin.email=admin@orangekuma.local \
          --set gitea.config.server.ROOT_URL=http://{{ k3s_server_ip }}:{{ gitea_http_port }} \
          --set gitea.config.server.SSH_PORT={{ gitea_ssh_port }} \
          --set gitea.config.server.SSH_LISTEN_PORT=22 \
          --set gitea.config.webhook.ALLOWED_HOST_LIST=* \
          --set gitea.config.database.DB_TYPE=sqlite3 \
          --set persistence.enabled=true \
          --set persistence.size=5Gi \
          --set persistence.storageClass=longhorn \
          --set postgresql-ha.enabled=false \
          --set postgresql.enabled=false \
          --set redis-cluster.enabled=false \
          --set redis.enabled=false \
          --wait --timeout 10m
      register: gitea_install
      changed_when: "'has been upgraded' in gitea_install.stdout or 'has been installed' in gitea_install.stdout"

    - name: Wait for Gitea to be ready
      shell: |
        kubectl -n gitea rollout status deploy/gitea --timeout=180s
      changed_when: false

    # =========================================
    # DRONE CI
    # =========================================
    - name: Create Drone OAuth app in Gitea
      shell: |
        # Wait for Gitea API to be responsive
        until curl -sf http://localhost:{{ gitea_http_port }}/api/v1/version; do
          sleep 5
        done

        # Check if OAuth app already exists
        EXISTING=$(curl -sf -u {{ gitea_admin_user }}:{{ gitea_admin_password }} \
          "http://localhost:{{ gitea_http_port }}/api/v1/user/applications/oauth2" | \
          python3 -c "import sys,json; apps=json.load(sys.stdin); print(next((a['client_id'] for a in apps if a['name']=='drone'), ''))" 2>/dev/null)

        if [ -n "$EXISTING" ]; then
          echo "EXISTING:$EXISTING"
          exit 0
        fi

        # Create OAuth app (confidential_client=true required: Drone does not support PKCE)
        RESULT=$(curl -sf -X POST -u {{ gitea_admin_user }}:{{ gitea_admin_password }} \
          -H "Content-Type: application/json" \
          -d '{
            "name": "drone",
            "redirect_uris": ["http://{{ k3s_server_ip }}/login"],
            "confidential_client": true
          }' \
          "http://localhost:{{ gitea_http_port }}/api/v1/user/applications/oauth2")

        CLIENT_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['client_id'])")
        CLIENT_SECRET=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['client_secret'])")

        echo "CLIENT_ID:$CLIENT_ID"
        echo "CLIENT_SECRET:$CLIENT_SECRET"
      register: drone_oauth
      changed_when: false

    - name: Parse Drone OAuth credentials
      set_fact:
        drone_client_id: "{{ drone_oauth.stdout_lines | select('match', '.*CLIENT_ID:.*') | first | regex_replace('.*CLIENT_ID:', '') | default('') }}"
        drone_client_secret: "{{ drone_oauth.stdout_lines | select('match', '.*CLIENT_SECRET:.*') | first | regex_replace('.*CLIENT_SECRET:', '') | default('') }}"
      when: "'CLIENT_SECRET' in drone_oauth.stdout"

    - name: Parse existing Drone OAuth ID
      set_fact:
        drone_client_id: "{{ drone_oauth.stdout_lines | select('match', '.*EXISTING:.*') | first | regex_replace('.*EXISTING:', '') }}"
      when: "'EXISTING' in drone_oauth.stdout"

    - name: Generate Drone RPC secret
      shell: openssl rand -hex 16
      register: drone_rpc_secret_raw
      changed_when: false

    - name: Check if Drone admin token already exists
      shell: |
        kubectl -n drone get secret drone-secrets \
          -o jsonpath='{.data.DRONE_ADMIN_TOKEN}' 2>/dev/null | base64 -d
      register: existing_drone_admin_token
      changed_when: false
      failed_when: false

    - name: Generate Drone admin token (only if missing)
      shell: openssl rand -hex 16
      register: new_drone_admin_token
      when: existing_drone_admin_token.stdout == ''
      changed_when: false

    - name: Set drone_admin_token fact
      set_fact:
        drone_admin_token: >-
          {{ existing_drone_admin_token.stdout
             if existing_drone_admin_token.stdout != ''
             else new_drone_admin_token.stdout }}

    - name: Create Drone secret
      shell: |
        kubectl -n drone create secret generic drone-secrets \
          --from-literal=DRONE_GITEA_CLIENT_ID="{{ drone_client_id }}" \
          --from-literal=DRONE_GITEA_CLIENT_SECRET="{{ drone_client_secret }}" \
          --from-literal=DRONE_RPC_SECRET="{{ drone_rpc_secret_raw.stdout }}" \
          --from-literal=DRONE_ADMIN_TOKEN="{{ drone_admin_token }}" \
          --dry-run=client -o yaml | kubectl apply -f -
      when: "'EXISTING' not in drone_oauth.stdout"
      changed_when: false

    - name: Deploy Drone Server
      shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: drone-server
          namespace: drone
        spec:
          replicas: 1
          strategy:
            type: Recreate
          selector:
            matchLabels:
              app: drone-server
          template:
            metadata:
              labels:
                app: drone-server
            spec:
              enableServiceLinks: false
              containers:
              - name: drone
                image: drone/drone:2.20.0
                ports:
                - containerPort: 80
                env:
                - name: DRONE_GITEA_SERVER
                  value: "http://{{ k3s_server_ip }}:{{ gitea_http_port }}"
                - name: DRONE_GITEA_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: drone-secrets
                      key: DRONE_GITEA_CLIENT_ID
                - name: DRONE_GITEA_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: drone-secrets
                      key: DRONE_GITEA_CLIENT_SECRET
                - name: DRONE_RPC_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: drone-secrets
                      key: DRONE_RPC_SECRET
                - name: DRONE_SERVER_HOST
                  value: "{{ k3s_server_ip }}"
                - name: DRONE_SERVER_PROTO
                  value: "http"
                - name: DRONE_ADMIN_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: drone-secrets
                      key: DRONE_ADMIN_TOKEN
                - name: DRONE_USER_CREATE
                  value: "username:{{ gitea_admin_user }},machine:false,admin:true,token:{{ drone_admin_token }}"
                volumeMounts:
                - name: data
                  mountPath: /data
              volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: drone-server-pvc
        ---
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: drone-server-pvc
          namespace: drone
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: longhorn
          resources:
            requests:
              storage: 2Gi
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: drone-server
          namespace: drone
        spec:
          type: LoadBalancer
          selector:
            app: drone-server
          ports:
          - port: 80
            targetPort: 80
        EOF

    # drone-runner-docker handles kind=pipeline, type=docker jobs, which
    # is what all imported repo .drone.yml files use (plugins/docker for
    # image builds). A privileged Docker-in-Docker sidecar provides the
    # Docker daemon the runner connects to over tcp://localhost:2375.
    - name: Deploy Drone Runner
      shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: drone-runner-docker
          namespace: drone
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: drone-runner-docker
          template:
            metadata:
              labels:
                app: drone-runner-docker
            spec:
              enableServiceLinks: false
              containers:
              - name: dind
                image: docker:26-dind
                securityContext:
                  privileged: true
                env:
                - name: DOCKER_TLS_CERTDIR
                  value: ""
                args:
                  - "--host=tcp://0.0.0.0:2375"
                  - "--tls=false"
                  - "--insecure-registry={{ k3s_server_ip }}:{{ gitea_http_port }}"
                volumeMounts:
                - name: docker-storage
                  mountPath: /var/lib/docker
              - name: runner
                image: drone/drone-runner-docker:1
                env:
                - name: DRONE_RPC_HOST
                  value: "drone-server.drone.svc:80"
                - name: DRONE_RPC_PROTO
                  value: "http"
                - name: DRONE_RPC_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: drone-secrets
                      key: DRONE_RPC_SECRET
                - name: DOCKER_HOST
                  value: "tcp://localhost:2375"
                - name: DRONE_RUNNER_CAPACITY
                  value: "2"
                - name: DRONE_RUNNER_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
              volumes:
              - name: docker-storage
                emptyDir: {}
        EOF

    # =========================================
    # ARGO CD
    # =========================================
    - name: Add Argo CD Helm repo
      shell: |
        helm repo add argo https://argoproj.github.io/argo-helm
        helm repo update
      changed_when: false

    # timeout.reconciliation controls how often the application-controller
    # re-reads Git when there is no webhook. The chart default is 180s, so a
    # freshly provisioned customer could take up to 3 minutes to appear even
    # though the Applications have automated sync. We drop it to 30s so a
    # Semaphore commit is picked up and deployed within ~30s without anyone
    # clicking Refresh in the UI. (A Gitea push webhook is not used because
    # Gitea's payload reports its public ROOT_URL host, which does not
    # normalize-match the in-cluster service repoURL the Applications clone
    # from, so the webhook would refresh nothing.)
    - name: Install Argo CD
      shell: |
        helm upgrade --install argocd argo/argo-cd \
          --namespace argocd \
          --version {{ argocd_chart_version }} \
          --set server.service.type=NodePort \
          --set server.service.nodePortHttp={{ argocd_port }} \
          --set server.extraArgs[0]=--insecure \
          --set configs.params."server\.insecure"=true \
          --set configs.cm."timeout\.reconciliation"=30s \
          --wait --timeout 10m
      register: argocd_install
      changed_when: "'has been upgraded' in argocd_install.stdout or 'has been installed' in argocd_install.stdout"

    - name: Wait for Argo CD server to be ready
      shell: |
        kubectl -n argocd rollout status deploy/argocd-server --timeout=180s
      changed_when: false

    # The application-controller reads timeout.reconciliation at startup, not
    # at runtime, so on an upgrade where the value changed it must be
    # restarted to apply the new interval. Harmless on a fresh install.
    - name: Restart Argo CD application-controller to apply reconciliation interval
      shell: |
        kubectl -n argocd rollout restart statefulset/argocd-application-controller
        kubectl -n argocd rollout status statefulset/argocd-application-controller --timeout=180s
      when: argocd_install.changed
      changed_when: true

    - name: Get Argo CD initial admin password
      shell: |
        kubectl -n argocd get secret argocd-initial-admin-secret \
          -o jsonpath="{.data.password}" | base64 -d
      register: argocd_password
      changed_when: false

    # ----------------------------------------------------------------
    # Argo CD Image Updater (auto-update strategy, tier A + B)
    # ----------------------------------------------------------------
    # Watches the Gitea container registry for new tags of images
    # referenced by Applications carrying the
    # argocd-image-updater.argoproj.io/image-list annotation.
    # When a new tag appears the updater rewrites the manifest in the
    # corresponding Gitea repo (write-back-method: git), Argo CD then
    # reconciles the customer Deployments to the new image.
    #
    # The Gitea registry credentials Secret is created in Phase 4
    # (setup-cicd-pipeline.yml) because it reuses the argocd-gitops
    # PAT minted there. Until that runs the updater pod will retry
    # without succeeding - harmless and self-heals.
    - name: Install Argo CD Image Updater
      shell: |
        helm upgrade --install argocd-image-updater argo/argocd-image-updater \
          --namespace argocd \
          --version {{ argocd_image_updater_chart_version }} \
          --set config.applicationsAPIKind=kubernetes \
          --set config.argocd.plaintext=true \
          --set config.argocd.insecure=true \
          --set config.argocd.serverAddress=argocd-server.argocd.svc:80 \
          --wait --timeout 8m
      register: argocd_image_updater_install
      changed_when: "'has been upgraded' in argocd_image_updater_install.stdout or 'has been installed' in argocd_image_updater_install.stdout"

    # =========================================
    # PROMETHEUS + GRAFANA (Monitoring)
    # =========================================
    - name: Add Prometheus community Helm repo
      shell: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
      changed_when: false

    # Grafana provisioning is made explicit instead of relying on the
    # chart defaults: we write a values file that (1) provisions the
    # Prometheus + Alertmanager datasources directly into Grafana's
    # provisioning dir (no dependency on the datasource sidecar, which is
    # why the datasource previously had to be added by hand), and (2) keeps
    # the dashboard sidecar on and watching ALL namespaces so both the
    # bundled kube/node dashboards and our own labelled dashboard
    # ConfigMaps are loaded automatically.
    - name: Render Grafana provisioning values file
      copy:
        dest: /tmp/grafana-values.yaml
        mode: "0644"
        content: |
          grafana:
            defaultDashboardsEnabled: true
            sidecar:
              datasources:
                enabled: false
              dashboards:
                enabled: true
                label: grafana_dashboard
                labelValue: "1"
                searchNamespace: ALL
                provider:
                  foldersFromFilesStructure: true
            datasources:
              datasources.yaml:
                apiVersion: 1
                datasources:
                  - name: Prometheus
                    uid: prometheus
                    type: prometheus
                    access: proxy
                    url: http://prometheus-kube-prometheus-prometheus.monitoring:9090
                    isDefault: true
                  - name: Alertmanager
                    uid: alertmanager
                    type: alertmanager
                    access: proxy
                    url: http://prometheus-kube-prometheus-alertmanager.monitoring:9093
                    jsonData:
                      implementation: prometheus
      changed_when: false

    - name: Install kube-prometheus-stack
      shell: |
        helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --version {{ prometheus_stack_chart_version }} \
          -f /tmp/grafana-values.yaml \
          --set grafana.service.type=NodePort \
          --set grafana.service.nodePort={{ grafana_port }} \
          --set grafana.adminPassword={{ gitea_admin_password }} \
          --set grafana.persistence.enabled=true \
          --set grafana.persistence.storageClassName=longhorn \
          --set grafana.persistence.size=2Gi \
          --set prometheus.service.type=NodePort \
          --set prometheus.service.nodePort={{ prometheus_port }} \
          --set prometheus.prometheusSpec.retention=7d \
          --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.storageClassName=longhorn \
          --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.resources.requests.storage=5Gi \
          --set alertmanager.service.type=NodePort \
          --set alertmanager.service.nodePort={{ alertmanager_port }} \
          --set alertmanager.alertmanagerSpec.storage.volumeClaimTemplate.spec.storageClassName=longhorn \
          --set alertmanager.alertmanagerSpec.storage.volumeClaimTemplate.spec.resources.requests.storage=2Gi \
          --wait --timeout 15m
      register: prometheus_install
      changed_when: "'has been upgraded' in prometheus_install.stdout or 'has been installed' in prometheus_install.stdout"

    # Custom platform dashboard: copied to the node and wrapped in a
    # ConfigMap carrying the grafana_dashboard=1 label so the Grafana
    # dashboard sidecar imports it automatically (no manual upload).
    - name: Copy Orange platform dashboard JSON to the node
      copy:
        src: files/orange-platform-dashboard.json
        dest: /tmp/orange-platform-dashboard.json
        mode: "0644"

    - name: Create/refresh the Orange platform Grafana dashboard ConfigMap
      shell: |
        kubectl -n monitoring create configmap orange-platform-dashboard \
          --from-file=orange-platform.json=/tmp/orange-platform-dashboard.json \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl -n monitoring label configmap orange-platform-dashboard \
          grafana_dashboard=1 --overwrite
      register: orange_dashboard_cm
      changed_when: "'configured' in orange_dashboard_cm.stdout or 'created' in orange_dashboard_cm.stdout"

    # =========================================
    # MAILPIT (Mail catcher)
    # =========================================
    - name: Create mailpit namespace
      shell: kubectl create namespace mailpit --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

    - name: Deploy Mailpit
      shell: |
        kubectl apply -f - <<'EOF'
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: mailpit
          namespace: mailpit
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: mailpit
          template:
            metadata:
              labels:
                app: mailpit
            spec:
              containers:
                - name: mailpit
                  image: axllent/mailpit:v1.21.6
                  ports:
                    - containerPort: 1025
                    - containerPort: 8025
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: mailpit
          namespace: mailpit
        spec:
          type: NodePort
          selector:
            app: mailpit
          ports:
            - name: smtp
              port: 1025
              targetPort: 1025
              nodePort: {{ mailpit_smtp_port }}
            - name: web
              port: 8025
              targetPort: 8025
              nodePort: {{ mailpit_web_port }}
        EOF
      args:
        executable: /bin/bash
      register: mailpit_deploy
      changed_when: "'configured' in mailpit_deploy.stdout or 'created' in mailpit_deploy.stdout"

    # =========================================
    # ALERTMANAGER EMAIL CONFIGURATIE
    # =========================================
    - name: Configure Alertmanager with email routing via Mailpit
      shell: |
        kubectl -n monitoring create secret generic \
          alertmanager-prometheus-kube-prometheus-alertmanager \
          --from-literal=alertmanager.yaml='
        global:
          resolve_timeout: 5m
          smtp_smarthost: "mailpit.mailpit.svc.cluster.local:1025"
          smtp_from: "alertmanager@orangekuma.local"
          smtp_require_tls: false
        inhibit_rules:
        - equal:
          - namespace
          - alertname
          source_matchers:
          - severity = critical
          target_matchers:
          - severity =~ warning|info
        - equal:
          - namespace
          - alertname
          source_matchers:
          - severity = warning
          target_matchers:
          - severity = info
        - equal:
          - namespace
          source_matchers:
          - alertname = InfoInhibitor
          target_matchers:
          - severity = info
        - target_matchers:
          - alertname = InfoInhibitor
        receivers:
        - name: "null"
        - name: email
          email_configs:
          - to: "{{ alert_receiver_email }}"
        route:
          group_by:
          - namespace
          group_interval: 5m
          group_wait: 30s
          receiver: email
          repeat_interval: 12h
          routes:
          - matchers:
            - alertname = "Watchdog"
            receiver: "null"
        templates:
        - /etc/alertmanager/config/*.tmpl
        ' \
          --dry-run=client -o yaml | kubectl apply -f -
      args:
        executable: /bin/bash
      register: alertmanager_config
      changed_when: "'configured' in alertmanager_config.stdout or 'created' in alertmanager_config.stdout"

    - name: Restart Alertmanager to pick up new config
      shell: |
        kubectl -n monitoring rollout restart \
          statefulset/alertmanager-prometheus-kube-prometheus-alertmanager
      register: alertmanager_restart
      changed_when: alertmanager_config.changed

    # =========================================
    # SEMAPHORE (Ansible UI)
    # =========================================
    # The Semaphore access-key encryption key must be stable across
    # Ansible runs. Previously it was rendered inline from
    # lookup('password', '/dev/null length=32 chars=hexdigits') which
    # generated a NEW key every run. The encrypted BoltDB on the PVC
    # could then no longer be decrypted and the pod went into
    # CrashLoopBackOff. Persist the key in a Kubernetes Secret on first
    # creation and reuse it forever.
    # BoltDB is kept on purpose: the original crash was key drift, not
    # a database engine problem; Bolt keeps the deployment lean (no
    # extra Postgres dependency).
    - name: Read existing Semaphore encryption key from secret (if present)
      shell: |
        set -o pipefail
        kubectl -n semaphore get secret semaphore-secrets \
          -o jsonpath='{.data.SEMAPHORE_ACCESS_KEY_ENCRYPTION}' 2>/dev/null | base64 -d
      args:
        executable: /bin/bash
      register: existing_semaphore_encryption_key
      changed_when: false
      failed_when: false

    - name: Generate Semaphore encryption key (only if missing)
      shell: openssl rand -hex 32
      register: new_semaphore_encryption_key
      when: existing_semaphore_encryption_key.stdout == ''
      changed_when: false

    - name: Set semaphore_encryption_key fact
      set_fact:
        semaphore_encryption_key: >-
          {{ existing_semaphore_encryption_key.stdout
             if existing_semaphore_encryption_key.stdout != ''
             else new_semaphore_encryption_key.stdout }}

    - name: Create Semaphore secrets (encryption key + admin password)
      shell: |
        kubectl -n semaphore create secret generic semaphore-secrets \
          --from-literal=SEMAPHORE_ACCESS_KEY_ENCRYPTION="{{ semaphore_encryption_key }}" \
          --from-literal=SEMAPHORE_ADMIN_PASSWORD="{{ gitea_admin_password }}" \
          --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

    - name: Deploy Semaphore
      shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: semaphore
          namespace: semaphore
        spec:
          replicas: 1
          strategy:
            type: Recreate
          selector:
            matchLabels:
              app: semaphore
          template:
            metadata:
              labels:
                app: semaphore
            spec:
              securityContext:
                fsGroup: 1001
              containers:
              - name: semaphore
                image: {{ semaphore_image }}
                ports:
                - containerPort: 3000
                readinessProbe:
                  httpGet:
                    path: /api/ping
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 30
                env:
                - name: SEMAPHORE_DB_DIALECT
                  value: bolt
                - name: SEMAPHORE_ADMIN_NAME
                  value: admin
                - name: SEMAPHORE_ADMIN_EMAIL
                  value: admin@orangekuma.local
                - name: SEMAPHORE_ADMIN
                  value: admin
                # Both sensitive vars come from the semaphore-secrets
                # Secret. The encryption key must NOT regenerate on each
                # Ansible run - see the idempotent secret-creation block
                # above for the rationale.
                - name: SEMAPHORE_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: semaphore-secrets
                      key: SEMAPHORE_ADMIN_PASSWORD
                - name: SEMAPHORE_ACCESS_KEY_ENCRYPTION
                  valueFrom:
                    secretKeyRef:
                      name: semaphore-secrets
                      key: SEMAPHORE_ACCESS_KEY_ENCRYPTION
                volumeMounts:
                - name: data
                  mountPath: /var/lib/semaphore
              volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: semaphore-pvc
        ---
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: semaphore-pvc
          namespace: semaphore
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: longhorn
          resources:
            requests:
              storage: 1Gi
        ---
        apiVersion: v1
        kind: Service
        metadata:
          # Named semaphore-ui, NOT semaphore. A Service named "semaphore"
          # would make k8s inject SEMAPHORE_PORT=tcp://<clusterIP>:3000 into
          # every pod in this namespace. Semaphore reads SEMAPHORE_PORT as its
          # own listen port and expects a bare number, so the tcp:// value
          # makes it fail to bind and crash-loop.
          name: semaphore-ui
          namespace: semaphore
        spec:
          type: NodePort
          selector:
            app: semaphore
          ports:
          - port: 3000
            targetPort: 3000
            nodePort: {{ semaphore_port }}
        EOF

    - name: Wait for Semaphore deployment to roll out
      shell: |
        kubectl -n semaphore rollout status deploy/semaphore --timeout=180s
      changed_when: false

    # ----------------------------------------------------------------
    # Semaphore project bootstrap (REST API over curl + cookie jar)
    # ----------------------------------------------------------------
    # Semaphore uses cookie-based session auth. The cookie jar lives at
    # /tmp/semaphore.cookies for the duration of this play.
    #
    # End-state created here, idempotently:
    #   - Project "Orange Kuma Provisioning"
    #   - SSH key "none" (Semaphore requires a key on every project)
    #   - Repository pointing at project-cloud on GitHub (Semaphore
    #     clones it when running templates; this is the source of
    #     provision-customer.yml)
    #   - Inventory "localhost" (static, runs Ansible locally inside
    #     the Semaphore pod)
    #   - Environments "sales" and "ops" each setting target_repo via
    #     extra_vars
    #   - Templates "Nieuwe klant aanmaken" (sales) and "Testklant
    #     aanmaken" (ops) bound to the matching environments
    - name: Wait for Semaphore HTTP API to respond
      ansible.builtin.uri:
        url: "http://localhost:{{ semaphore_port }}/api/ping"
        status_code: [200, 204]
      register: semaphore_ping
      retries: 30
      delay: 5
      until: semaphore_ping.status in [200, 204]

    - name: Log in to Semaphore as admin
      shell: |
        set -o pipefail
        curl -sS -c /tmp/semaphore.cookies \
          -H "Content-Type: application/json" \
          -X POST "http://localhost:{{ semaphore_port }}/api/auth/login" \
          -d "{\"auth\":\"admin\",\"password\":\"{{ gitea_admin_password }}\"}"
      args:
        executable: /bin/bash
      changed_when: false
      register: semaphore_login
      retries: 5
      delay: 3
      until: semaphore_login.rc == 0

    - name: List existing Semaphore projects
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          "http://localhost:{{ semaphore_port }}/api/projects"
      register: semaphore_projects_raw
      changed_when: false

    - name: Set fact for existing Orange Kuma project (if any)
      set_fact:
        semaphore_project_existing: >-
          {{ (semaphore_projects_raw.stdout | from_json)
             | selectattr('name', 'equalto', 'Orange Kuma Provisioning')
             | list }}

    - name: Create Semaphore project "Orange Kuma Provisioning"
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          -H "Content-Type: application/json" \
          -X POST "http://localhost:{{ semaphore_port }}/api/projects" \
          -d '{
                "name": "Orange Kuma Provisioning",
                "alert": false,
                "max_parallel_tasks": 0
              }'
      register: semaphore_project_create
      when: semaphore_project_existing | length == 0
      changed_when: true

    - name: Resolve Semaphore project id
      set_fact:
        semaphore_project_id: >-
          {{
            (semaphore_project_existing[0].id)
            if (semaphore_project_existing | length > 0)
            else (semaphore_project_create.stdout | from_json).id
          }}

    - name: List existing Semaphore keys for the project
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/keys"
      register: semaphore_keys_raw
      changed_when: false

    - name: Create "none" SSH key on the project (required placeholder)
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          -H "Content-Type: application/json" \
          -X POST "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/keys" \
          -d '{
                "name": "none",
                "type": "none",
                "project_id": {{ semaphore_project_id }}
              }'
      register: semaphore_key_create
      when: >-
        ((semaphore_keys_raw.stdout | from_json)
          | selectattr('name', 'equalto', 'none')
          | list) | length == 0
      changed_when: true

    - name: Re-fetch Semaphore keys to pick up the new "none" key
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/keys"
      register: semaphore_keys_after
      changed_when: false

    - name: Resolve Semaphore "none" key id
      set_fact:
        semaphore_none_key_id: >-
          {{ ((semaphore_keys_after.stdout | from_json)
                | selectattr('name', 'equalto', 'none')
                | list)[0].id }}

    - name: List existing Semaphore repositories for the project
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/repositories"
      register: semaphore_repos_raw
      changed_when: false

    - name: Register project-cloud as a Semaphore repository
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          -H "Content-Type: application/json" \
          -X POST "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/repositories" \
          -d '{
                "name": "project-cloud",
                "project_id": {{ semaphore_project_id }},
                "git_url": "{{ semaphore_repo_url }}",
                "git_branch": "{{ semaphore_repo_branch }}",
                "ssh_key_id": {{ semaphore_none_key_id }}
              }'
      register: semaphore_repo_create
      when: >-
        ((semaphore_repos_raw.stdout | from_json)
          | selectattr('name', 'equalto', 'project-cloud')
          | list) | length == 0
      changed_when: true

    - name: Re-fetch Semaphore repositories
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/repositories"
      register: semaphore_repos_after
      changed_when: false

    - name: Resolve Semaphore repository id for project-cloud
      set_fact:
        semaphore_repo_id: >-
          {{ ((semaphore_repos_after.stdout | from_json)
                | selectattr('name', 'equalto', 'project-cloud')
                | list)[0].id }}

    - name: List existing Semaphore inventories for the project
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/inventory"
      register: semaphore_inventories_raw
      changed_when: false

    - name: Create localhost inventory
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          -H "Content-Type: application/json" \
          -X POST "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/inventory" \
          -d '{
                "name": "localhost",
                "project_id": {{ semaphore_project_id }},
                "inventory": "localhost ansible_connection=local",
                "ssh_key_id": null,
                "become_key_id": null,
                "type": "static"
              }'
      register: semaphore_inventory_create
      when: >-
        ((semaphore_inventories_raw.stdout | from_json)
          | selectattr('name', 'equalto', 'localhost')
          | list) | length == 0
      changed_when: true

    - name: Re-fetch Semaphore inventories
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/inventory"
      register: semaphore_inventories_after
      changed_when: false

    - name: Resolve Semaphore inventory id
      set_fact:
        semaphore_inventory_id: >-
          {{ ((semaphore_inventories_after.stdout | from_json)
                | selectattr('name', 'equalto', 'localhost')
                | list)[0].id }}

    - name: List existing Semaphore environments for the project
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/environment"
      register: semaphore_envs_raw
      changed_when: false

    - name: Create "sales" environment (target_repo=customer-instances)
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          -H "Content-Type: application/json" \
          -X POST "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/environment" \
          -d '{
                "name": "sales",
                "project_id": {{ semaphore_project_id }},
                "password": null,
                "json": "{\"target_repo\":\"customer-instances\",\"k3s_server_ip\":\"{{ k3s_server_ip }}\",\"domain_suffix\":\"{{ domain_suffix }}\",\"ansible_python_interpreter\":\"auto_silent\"}",
                "env": "{}"
              }'
      register: semaphore_env_sales_create
      when: >-
        ((semaphore_envs_raw.stdout | from_json)
          | selectattr('name', 'equalto', 'sales')
          | list) | length == 0
      changed_when: true

    - name: Create "ops" environment (target_repo=test-customers)
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          -H "Content-Type: application/json" \
          -X POST "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/environment" \
          -d '{
                "name": "ops",
                "project_id": {{ semaphore_project_id }},
                "password": null,
                "json": "{\"target_repo\":\"test-customers\",\"k3s_server_ip\":\"{{ k3s_server_ip }}\",\"domain_suffix\":\"{{ domain_suffix }}\",\"ansible_python_interpreter\":\"auto_silent\"}",
                "env": "{}"
              }'
      register: semaphore_env_ops_create
      when: >-
        ((semaphore_envs_raw.stdout | from_json)
          | selectattr('name', 'equalto', 'ops')
          | list) | length == 0
      changed_when: true

    - name: Re-fetch Semaphore environments
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/environment"
      register: semaphore_envs_after
      changed_when: false

    - name: Resolve Semaphore environment ids
      set_fact:
        semaphore_env_sales_id: >-
          {{ ((semaphore_envs_after.stdout | from_json)
                | selectattr('name', 'equalto', 'sales')
                | list)[0].id }}
        semaphore_env_ops_id: >-
          {{ ((semaphore_envs_after.stdout | from_json)
                | selectattr('name', 'equalto', 'ops')
                | list)[0].id }}

    - name: List existing Semaphore templates for the project
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/templates"
      register: semaphore_templates_raw
      changed_when: false

    - name: Create sales template "Nieuwe klant aanmaken"
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          -H "Content-Type: application/json" \
          -X POST "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/templates" \
          -d '{
                "name": "Nieuwe klant aanmaken",
                "app": "ansible",
                "project_id": {{ semaphore_project_id }},
                "inventory_id": {{ semaphore_inventory_id }},
                "repository_id": {{ semaphore_repo_id }},
                "environment_id": {{ semaphore_env_sales_id }},
                "playbook": "ansible/playbooks/provision-customer.yml",
                "arguments": "[]",
                "description": "Provision een nieuwe productie-klant. Schrijft naar customer-instances en wordt door Argo CD live uitgerold.",
                "allow_override_args_in_task": false,
                "survey_vars": [
                  {"name":"customer_name","title":"Klantnaam (slug)","description":"3-32 tekens, kleine letters/cijfers/streepjes","type":"","required":true},
                  {"name":"customer_email","title":"Email","description":"Contactadres van de klant","type":"","required":true},
                  {"name":"admin_password","title":"Uptime Kuma admin wachtwoord","description":"Initieel wachtwoord voor de admin login van de klant","type":"","required":true},
                  {"name":"customer_domain","title":"Domein (optioneel)","description":"Domein om automatisch te monitoren (bv. klant.example.com). Laat leeg om geen monitor aan te maken.","type":"","required":false}
                ]
              }'
      register: semaphore_tpl_sales_create
      when: >-
        ((semaphore_templates_raw.stdout | from_json)
          | selectattr('name', 'equalto', 'Nieuwe klant aanmaken')
          | list) | length == 0
      changed_when: true

    - name: Create ops template "Testklant aanmaken"
      shell: |
        curl -sS -b /tmp/semaphore.cookies \
          -H "Content-Type: application/json" \
          -X POST "http://localhost:{{ semaphore_port }}/api/project/{{ semaphore_project_id }}/templates" \
          -d '{
                "name": "Testklant aanmaken",
                "app": "ansible",
                "project_id": {{ semaphore_project_id }},
                "inventory_id": {{ semaphore_inventory_id }},
                "repository_id": {{ semaphore_repo_id }},
                "environment_id": {{ semaphore_env_ops_id }},
                "playbook": "ansible/playbooks/provision-customer.yml",
                "arguments": "[]",
                "description": "Provision een test-klant. Schrijft naar test-customers en wordt door Argo CD live uitgerold (gescheiden van productie-statistieken).",
                "allow_override_args_in_task": false,
                "survey_vars": [
                  {"name":"customer_name","title":"Klantnaam (slug)","description":"3-32 tekens, kleine letters/cijfers/streepjes","type":"","required":true},
                  {"name":"customer_email","title":"Email","description":"Contactadres van de klant","type":"","required":true},
                  {"name":"admin_password","title":"Uptime Kuma admin wachtwoord","description":"Initieel wachtwoord voor de admin login van de klant","type":"","required":true},
                  {"name":"customer_domain","title":"Domein (optioneel)","description":"Domein om automatisch te monitoren (bv. klant.example.com). Laat leeg om geen monitor aan te maken.","type":"","required":false}
                ]
              }'
      register: semaphore_tpl_ops_create
      when: >-
        ((semaphore_templates_raw.stdout | from_json)
          | selectattr('name', 'equalto', 'Testklant aanmaken')
          | list) | length == 0
      changed_when: true

    - name: Log Semaphore bootstrap summary
      ansible.builtin.debug:
        msg: |
          Semaphore project "Orange Kuma Provisioning" is bootstrapped:
            URL:         http://{{ k3s_server_ip }}:{{ semaphore_port }}/project/{{ semaphore_project_id }}
            Templates:   "Nieuwe klant aanmaken" (sales)  and  "Testklant aanmaken" (ops)
            Login:       admin / <Gitea admin password>

    # =========================================
    # HEADLAMP (Kubernetes GUI)
    # =========================================
    - name: Add Headlamp Helm repo
      shell: |
        helm repo add headlamp https://kubernetes-sigs.github.io/headlamp/
        helm repo update
      changed_when: false

    - name: Install Headlamp
      shell: |
        helm upgrade --install headlamp headlamp/headlamp \
          --namespace kube-system \
          --version {{ headlamp_chart_version }} \
          --set service.type=NodePort \
          --set clusterRoleBinding.create=true \
          --wait --timeout 6m
      register: headlamp_install
      changed_when: "'has been upgraded' in headlamp_install.stdout or 'has been installed' in headlamp_install.stdout"

    # The Headlamp chart (v{{ headlamp_chart_version }}) does not honour a
    # service.nodePort value, so it leaves the NodePort unpinned and k3s
    # assigns a random one in 30000-32767. Patch it to the documented port
    # ({{ headlamp_port }}) so the README address (http://<node>:{{ headlamp_port }})
    # is always reachable and stable across redeploys.
    - name: Pin Headlamp Service to the documented NodePort
      shell: |
        kubectl -n kube-system patch svc headlamp --type=json \
          -p='[{"op":"replace","path":"/spec/ports/0/nodePort","value":{{ headlamp_port }}}]'
      register: headlamp_np_patch
      changed_when: "'patched' in headlamp_np_patch.stdout"

    - name: Create Headlamp admin service account
      shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: headlamp-admin
          namespace: kube-system
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: headlamp-admin
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: cluster-admin
        subjects:
        - kind: ServiceAccount
          name: headlamp-admin
          namespace: kube-system
        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: headlamp-admin-token
          namespace: kube-system
          annotations:
            kubernetes.io/service-account.name: headlamp-admin
        type: kubernetes.io/service-account-token
        EOF

    - name: Get Headlamp login token
      shell: |
        kubectl -n kube-system get secret headlamp-admin-token \
          -o jsonpath="{.data.token}" | base64 -d
      register: headlamp_token
      changed_when: false

    # =========================================
    # INGRESS CONTROLLER (per-customer external access)
    # =========================================
    # Customer Uptime Kuma instances are provisioned as ClusterIP Services
    # (see templates/customer-instance.yml.j2), so they need an ingress
    # controller to be reachable from outside the cluster. k3s was installed
    # with --disable=traefik, so we run ingress-nginx instead.
    #
    # The controller Service is a LoadBalancer exposing ONLY 443 (HTTPS).
    # Port 80 is deliberately left disabled because Drone already holds the
    # node's host port 80 via its own LoadBalancer (k3s ServiceLB / klipper
    # binds host 80 for drone-server); a second LoadBalancer requesting 80
    # would stay pending. 443 is free, so klipper binds host 443 here and each
    # customer is reachable at a port-less URL: https://<customer>.{{ domain_suffix }}
    # nip.io resolves that host to {{ k3s_server_ip }}, so no external DNS is
    # needed. TLS is served with ingress-nginx's built-in self-signed
    # certificate (browsers show a warning; acceptable for this platform).
    - name: Add ingress-nginx Helm repo
      shell: |
        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
        helm repo update
      changed_when: false

    - name: Install ingress-nginx
      shell: |
        helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
          --namespace ingress-nginx \
          --version {{ ingress_nginx_chart_version }} \
          --set controller.service.type=LoadBalancer \
          --set controller.service.enableHttp=false \
          --set controller.service.enableHttps=true \
          --wait --timeout 6m
      register: ingress_nginx_install
      changed_when: "'has been upgraded' in ingress_nginx_install.stdout or 'has been installed' in ingress_nginx_install.stdout"

    # =========================================
    # SUMMARY
    # =========================================
    - name: Print access information
      debug:
        msg:
          - "=== Phase 3 — Platform Bootstrap Complete! ==="
          - ""
          - "Gitea:         http://{{ k3s_server_ip }}:{{ gitea_http_port }}"
          - "               User: {{ gitea_admin_user }} / {{ gitea_admin_password }}"
          - "               SSH:  ssh://git@{{ k3s_server_ip }}:{{ gitea_ssh_port }}"
          - ""
          - "Drone CI:      http://{{ k3s_server_ip }}:{{ drone_port }}"
          - "               (Login via Gitea OAuth)"
          - ""
          - "Argo CD:       http://{{ k3s_server_ip }}:{{ argocd_port }}"
          - "               User: admin / {{ argocd_password.stdout }}"
          - ""
          - "Grafana:       http://{{ k3s_server_ip }}:{{ grafana_port }}"
          - "               User: admin / {{ gitea_admin_password }}"
          - ""
          - "Prometheus:    http://{{ k3s_server_ip }}:{{ prometheus_port }}"
          - "Alertmanager:  http://{{ k3s_server_ip }}:{{ alertmanager_port }}"
          - "Mailpit:       http://{{ k3s_server_ip }}:{{ mailpit_web_port }}"
          - "               (mail catcher — alerts ontvangen via SMTP :{{ mailpit_smtp_port }})"
          - ""
          - "Semaphore:     http://{{ k3s_server_ip }}:{{ semaphore_port }}"
          - "               User: admin / {{ gitea_admin_password }}"
          - ""
          - "Headlamp:      http://{{ k3s_server_ip }}:{{ headlamp_port }}"
          - "               Token opgeslagen in: /tmp/headlamp-token.txt"
          - ""
