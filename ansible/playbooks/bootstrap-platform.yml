          - "Voer Phase 4 uit voor de volledige samenvatting inclusief Management Tool."

    - name: Save Headlamp token to file
      copy:
        content: "{{ headlamp_token.stdout }}"
        dest: /tmp/headlamp-token.txt
        mode: "0600"
      delegate_to: localhost
      become: false
